<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maze</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

canvas {
    display: block;
}
#backBtn {
position: fixed;
top: 10px;
right: 15px;
z-index: 100;
padding: 8px 12px;
border-radius: 6px;
border: none;
background: #222;
color: white;
cursor: pointer;
font-size: 16px;
}
</style>
</head>

<body>
<div>
    <button id="backBtn">← Menu</button>
</div>
<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;
let player = {
    x: 100,
    y: 100,
    vx: 0,
    vy: 0,
    radius: 10
};

document.getElementById("backBtn").onclick = () => {
    window.location.href = "index.html";
};

let gyro = { x: 0, y: 0 };
let gyroEnabled = false;

// Enable gyro on tap (important for iPhone)
window.addEventListener("click", () => {
    if (typeof DeviceOrientationEvent.requestPermission === "function") {
        DeviceOrientationEvent.requestPermission().then(p => {
            if (p === "granted") gyroEnabled = true;
        });
    } else {
        gyroEnabled = true;
    }
}, { once: true });

window.addEventListener("deviceorientation", (e) => {
    if (!gyroEnabled) return;

    gyro.x = e.gamma || 0; // left/right
    gyro.y = e.beta || 0;  // forward/back
});

let walls = [
    { x: 200, y: 0, w: 20, h: 300 },
    { x: 400, y: 200, w: 20, h: 300 },
    { x: 100, y: 400, w: 300, h: 20 }
];

let goal = { x: 600, y: 400, r: 15 };

function update() {

    // Apply tilt force
    const force = 0.2;

    player.vx += (gyro.x / 45) * force;
    player.vy += (gyro.y / 45) * force;

    // Friction
    player.vx *= 0.95;
    player.vy *= 0.95;

    player.x += player.vx;
    player.y += player.vy;

    // Wall collisions
    walls.forEach(w => {
        if (
            player.x + player.radius > w.x &&
            player.x - player.radius < w.x + w.w &&
            player.y + player.radius > w.y &&
            player.y - player.radius < w.y + w.h
        ) {
            // Simple bounce back
            player.vx *= -0.5;
            player.vy *= -0.5;
        }
    });

    // Goal check
    const dx = player.x - goal.x;
    const dy = player.y - goal.y;

    if (Math.hypot(dx, dy) < player.radius + goal.r) {
        alert("You win!");
        player.x = 100;
        player.y = 100;
        player.vx = 0;
        player.vy = 0;
    }
}

function draw() {

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Walls
    ctx.fillStyle = "#ff00ff";
    walls.forEach(w => {
        ctx.fillRect(w.x, w.y, w.w, w.h);
    });

    // Goal
    ctx.beginPath();
    ctx.arc(goal.x, goal.y, goal.r, 0, Math.PI * 2);
    ctx.fillStyle = "#00ffcc";
    ctx.fill();

    // Player
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
