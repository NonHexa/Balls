<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Maze</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

canvas {
    display: block;
}
#backBtn {
position: fixed;
top: 10px;
right: 15px;
z-index: 100;
padding: 8px 12px;
border-radius: 6px;
border: none;
background: #222;
color: white;
cursor: pointer;
font-size: 16px;
}
</style>
</head>

<body>
<div>
    <button id="backBtn">← Menu</button>
</div>
<canvas id="game"></canvas>

<script>
    const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;
let player = {
    x: 100,
    y: 100,
    vx: 0,
    vy: 0,
    radius: 10
};
let goal = {
    x: 0,
    y: 0,
    r: 15
};
const cols = 15;
const rows = 20;
const cellSize = 40;

let maze = [];
let walls = [];

const offsetX = (canvas.width - cols * cellSize) / 2;
const offsetY = (canvas.height - rows * cellSize) / 2;

document.getElementById("backBtn").onclick = () => {
    window.location.href = "index.html";
};

let gyro = { x: 0, y: 0 };
let gyroEnabled = false;

// Enable gyro on tap (important for iPhone)
window.addEventListener("click", () => {
    if (typeof DeviceOrientationEvent.requestPermission === "function") {
        DeviceOrientationEvent.requestPermission().then(p => {
            if (p === "granted") gyroEnabled = true;
        });
    } else {
        gyroEnabled = true;
    }
}, { once: true });

window.addEventListener("deviceorientation", (e) => {
    if (!gyroEnabled) return;

    gyro.x = e.gamma || 0; // left/right
    gyro.y = e.beta || 0;  // forward/back
});

function createGrid() {
    maze = [];

    for (let y = 0; y < rows; y++) {
        let row = [];
        for (let x = 0; x < cols; x++) {
            row.push({
                x,
                y,
                visited: false,
                walls: { top: true, right: true, bottom: true, left: true }
            });
        }
        maze.push(row);
    }
}

function generateMaze(x = 0, y = 0) {
    let current = maze[y][x];
    current.visited = true;

    const directions = shuffle([
        [0, -1, "top", "bottom"],
        [1, 0, "right", "left"],
        [0, 1, "bottom", "top"],
        [-1, 0, "left", "right"]
    ]);

    for (let [dx, dy, wall, opposite] of directions) {
        let nx = x + dx;
        let ny = y + dy;

        if (nx >= 0 && ny >= 0 && nx < cols && ny < rows) {
            let next = maze[ny][nx];

            if (!next.visited) {
                current.walls[wall] = false;
                next.walls[opposite] = false;

                generateMaze(nx, ny);
            }
        }
    }
}

function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

function buildWalls() {
    walls = [];

    maze.forEach(row => {
        row.forEach(cell => {
            const x = cell.x * cellSize + offsetX;
            const y = cell.y * cellSize + offsetY;

            if (cell.walls.top)
                walls.push({ x, y, w: cellSize, h: 4 });

            if (cell.walls.left)
                walls.push({ x, y, w: 4, h: cellSize });

            if (cell.walls.right)
                walls.push({ x: x + cellSize, y, w: 4, h: cellSize });

            if (cell.walls.bottom)
                walls.push({ x, y: y + cellSize, w: cellSize, h: 4 });
        });
    });
}

createGrid();
generateMaze();
buildWalls();

player.x = 20;
player.y = 20;

goal.x = (cols - 1) * cellSize + 20;
goal.y = (rows - 1) * cellSize + 20;


function update() {
// Apply tilt force
const force = 0.2;

player.vx += (gyro.x / 45) * force;
player.vy += (gyro.y / 45) * force;

// Friction (important)
player.vx *= 0.95;
player.vy *= 0.95;
// Move X
player.x += player.vx;

walls.forEach(w => {
    if (
        player.x + player.radius > w.x &&
        player.x - player.radius < w.x + w.w &&
        player.y + player.radius > w.y &&
        player.y - player.radius < w.y + w.h
    ) {
        // Bounce X only
        if (player.vx > 0) player.x = w.x - player.radius;
        if (player.vx < 0) player.x = w.x + w.w + player.radius;

        player.vx *= -0.5; // 50% bounce
    }
});

// Move Y
player.y += player.vy;

walls.forEach(w => {
    if (
        player.x + player.radius > w.x &&
        player.x - player.radius < w.x + w.w &&
        player.y + player.radius > w.y &&
        player.y - player.radius < w.y + w.h
    ) {
        // Bounce Y only
        if (player.vy > 0) player.y = w.y - player.radius;
        if (player.vy < 0) player.y = w.y + w.h + player.radius;

        player.vy *= -0.5; // 50% bounce
    }
});
const dx = player.x - goal.x;
const dy = player.y - goal.y;

if (Math.hypot(dx, dy) < player.radius + goal.r) {
    alert("You win!");

    createGrid();
    generateMaze();
    buildWalls();

    player.x = 20;
    player.y = 20;
    player.vx = 0;
    player.vy = 0;
}
}

function draw() {

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Walls
    ctx.fillStyle = "#ff00ff";
    walls.forEach(w => {
        ctx.fillRect(w.x, w.y, w.w, w.h);
    });

    // Goal
    ctx.beginPath();
    ctx.arc(goal.x, goal.y, goal.r, 0, Math.PI * 2);
    ctx.fillStyle = "#00ffcc";
    ctx.fill();

    // Player
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
