<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bouncy Balls</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

canvas {
    display: block;
}

.info {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    font-family: sans-serif;
    opacity: 0.8;
}


#settingsToggle {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 101;
    padding: 8px 12px;
    border-radius: 6px;
    border: none;
    background: #222;
    color: white;
    cursor: pointer;
    font-size: 16px;
}


.gui {
    box-sizing: border-box;
    background: rgba(0,0,0,0.95);
    padding: 12px;
    border-radius: 12px;
    color: white;
    font-family: sans-serif;
    display: none;
    z-index: 100;
}

.gui-row {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    margin-top: 8px;
}

.gui-row label {
    margin-top: 4px;
}

.gui input[type="range"] {
    width: 100%;
    margin-top: 6px;
}

.hint {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 4px;
    color: #ddd;
}

.gui.desktop {
    position: fixed;
    top: 80px;
    right: 10px;
    max-width: 260px;
    cursor: move;
    display: block; /* default desktop GUI visible */
}

@media (max-width: 600px) {

    /* Hide desktop GUI */
    .gui.desktop {
        display: none;
    }

    /* Mobile GUI styling */
    .gui.mobile {
        position: fixed;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 400px;
        font-size: 16px;
        border-radius: 16px;
        display: block;
    }

    /* Bigger settings button for mobile */
    #settingsToggle {
        bottom: 80px;
        top: auto;
        left: 50%;
        transform: translateX(-50%);
        font-size: 18px;
        padding: 12px 18px;
        border-radius: 10px;
    }
}
</style>
</head>

<body>

<div class="info">
    Drag balls • Double click/tap to spawn
</div>

<!-- Settings Toggle Button -->
<button id="settingsToggle">⚙ Settings</button>

<!-- GUI Container -->
<div class="gui desktop mobile">

    <!-- Gravity & Orbit -->
    <div class="gui-row">
        <label><input type="checkbox" id="gravityToggle"> Gravity</label>
        <div id="gravityHint" class="hint">Tap Gravity to enable motion on mobile</div>

        <label><input type="checkbox" id="orbitToggle" checked> Orbit</label>
    </div>

    <!-- Gravity Strength -->
    <div class="gui-row">
        <label>Gravity strength: <span id="gravityStrengthValue">0.2</span></label>
        <input type="range" id="gravityStrengthSlider" min="0" max="1" step="0.01" value="0.2">
    </div>

    <!-- Friction & Vibrate -->
    <div class="gui-row">
        <label>Friction: <span id="frictionValue">0.995</span></label>
        <input type="range" id="frictionSlider" min="0.95" max="1.1" step="0.005" value="0.995">
        <label><input type="checkbox" id="vibrateToggle" checked> Vibrate on collision</label>
    </div>

    <!-- Trail -->
    <div class="gui-row">
        <label><input type="checkbox" id="trailToggle" checked> Trail</label>
        <label>Trail opacity: <span id="trailAlphaValue">0.15</span></label>
        <input type="range" id="trailAlphaSlider" min="0" max="1" step="0.01" value="0.15">
    </div>

    <!-- Glow -->
    <div class="gui-row">
        <label><input type="checkbox" id="glowToggle" checked> Glow</label>
        <label>Glow strength: <span id="glowValue">20</span></label>
        <input type="range" id="glowSlider" min="0" max="60" step="1" value="20">
    </div>

    <!-- Color -->
    <div class="gui-row">
        <label>Color mode:</label>
        <select id="colorMode">
            <option value="random">Random</option>
            <option value="fixed">Fixed</option>
            <option value="hueCycle">Hue cycle</option>
        </select>
    </div>

    <div id="fixedColorRow" class="gui-row" style="display:none;">
        <label>Fixed color: <input type="color" id="fixedColor" value="#ff0000"></label>
    </div>

    <!-- Spawn Button -->
    <button onclick="spawnBalls(1)">Spawn Balls</button>

</div>

<canvas id="canvas"></canvas>

<script>

// Toggle GUI visibility
const settingsToggleBtn = document.getElementById("settingsToggle");
const guiBox = document.querySelector(".gui");

settingsToggleBtn.addEventListener("click", () => {
    guiBox.style.display = guiBox.style.display === "block" ? "none" : "block";
});

// Make desktop GUI draggable
let isDraggingGUI = false;
let offsetX = 0, offsetY = 0;

guiBox.addEventListener("mousedown", e => {
    if (!e.target.closest('input') && !e.target.closest('button') && !e.target.closest('select')) {
        isDraggingGUI = true;
        offsetX = e.clientX - guiBox.offsetLeft;
        offsetY = e.clientY - guiBox.offsetTop;
    }
});

window.addEventListener("mousemove", e => {
    if (!isDraggingGUI) return;
    guiBox.style.left = (e.clientX - offsetX) + "px";
    guiBox.style.top = (e.clientY - offsetY) + "px";
});

window.addEventListener("mouseup", () => { isDraggingGUI = false; });

// Is just a whole bunch of constants as um need them :)
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const gravityToggle = document.getElementById("gravityToggle");
const gravityHint = document.getElementById("gravityHint");

const settingsToggle = document.getElementById("settingsToggle");
const gui = document.querySelector(".gui");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

let friction = 0.995;
const wallBounce = 0.9;

let gravityEnabled = false;

let gravityX = 0;
let gravityY = 0;
let gravityStrength = 0.2;
let motionListenerAdded = false;

const supportsDeviceMotion = typeof DeviceMotionEvent !== "undefined";
const supportsDeviceOrientation = typeof DeviceOrientationEvent !== "undefined";
const requiresPermission = supportsDeviceMotion && typeof DeviceMotionEvent.requestPermission === "function";

let trailEnabled = true;
let trailAlpha = 0.15;

let glowEnabled = true;
let glowStrength = 20;
let orbitStartTime = 0;

let vibrateEnabled = true;
const vibrateToggle = document.getElementById("vibrateToggle");

if(vibrateToggle){
    vibrateToggle.onchange = () => {
        vibrateEnabled = vibrateToggle.checked;
    };
}

// Sound for collisions
const collisionSound = new Audio("BallSounds.mp3")
collisionSound.volume = 1;


let colorMode = "random";
let fixedColor = "#ff0000";

// Make it so the Setting window is moveable :)
let guiOffsetX = 0;
let guiOffsetY = 0;

gui.addEventListener("mousedown", (e) => {

    if("ontouchstart" in window) return;

    if(e.target.tagName === "INPUT" || e.target.tagName === "BUTTON" || e.target.tagName === "SELECT"){
        return;
    }

    isDraggingGUI = true;
    guiOffsetX = e.clientX - gui.offsetLeft;
    guiOffsetY = e.clientY - gui.offsetTop;
});
// window events just for gui stuff dont worry
window.addEventListener("mousemove", (e) => {
    if(!isDraggingGUI) return;

    gui.style.left = (e.clientX - guiOffsetX) + "px";
    gui.style.top = (e.clientY - guiOffsetY) + "px";
    gui.style.right = "auto"; // important so it doesn't snap back
});

window.addEventListener("mouseup", () => {
    isDraggingGUI = false;
});

window.addEventListener("click", (e) => {
    if(!gui.contains(e.target) && e.target !== settingsToggle){
        gui.classList.remove("open");
    }
});

// orbit toggle listener :) Bethan this make is so the code can check if it is toggled incase you wondered
const orbitToggle = document.getElementById("orbitToggle");
let orbitEnabled = true;

if(orbitToggle){
    orbitToggle.onchange = () => {
        orbitEnabled = orbitToggle.checked;
    };
}

let lastMotionAt = 0;
const MOTION_TIMEOUT_MS = 500; // if no motion data received recently, fall back to downward gravity

settingsToggle.onclick = () => {
    gui.classList.toggle("open");
};

function setGravityHint(text){
    if(gravityHint){
        gravityHint.textContent = text;
    }
}

gravityToggle.onchange = async e => {
    gravityEnabled = e.target.checked;

    if (gravityEnabled) {
        setGravityHint("Requesting motion access...");
        await requestMotionPermission();
    } else {
        setGravityHint("Tap Gravity to enable motion on mobile");
    }
};

function handleMotion(event){

    const acc = event.accelerationIncludingGravity || event.acceleration;
    if(!acc) return;

    let ax = acc.x;
    let ay = acc.y;

    // scale to match existing gravity strength
    gravityX = (-ax / 9.8) * gravityStrength;
    gravityY = (ay / 9.8) * gravityStrength;

    lastMotionAt = performance.now();
}

function handleOrientation(event){

    if(event.beta === null || event.gamma === null) return;

    // left/right tilt
    let tiltX = event.gamma;

    // forward/back tilt
    let tiltY = event.beta;

    // normalize values
    tiltX = Math.max(-45, Math.min(45, tiltX)) / 45;
    tiltY = Math.max(-45, Math.min(45, tiltY)) / 45;

    gravityX = tiltX * gravityStrength;
    gravityY = tiltY * gravityStrength;

    lastMotionAt = performance.now();
}

async function requestMotionPermission(){
    if(typeof DeviceMotionEvent !== "undefined" &&
       typeof DeviceMotionEvent.requestPermission === "function"){
        try{
            const response = await DeviceMotionEvent.requestPermission();

            if(response === "granted"){
                addMotionListener();
                setGravityHint("Gravity enabled. Tilt your device.");
            } else {
                gravityEnabled = false;
                gravityToggle.checked = false;
                setGravityHint("Motion access denied. Gravity disabled.");
                alert("Motion access denied. Gravity disabled.");
            }
        }catch(e){
            console.log(e);
        }
    } else {
        // Android / most mobile browsers: no permission required
        addMotionListener();
        setGravityHint("Gravity enabled. Tilt your device.");
    }
}

function addMotionListener(){
    if(motionListenerAdded) return;

    if(supportsDeviceMotion){
        window.addEventListener("devicemotion", handleMotion);
    }

    if(supportsDeviceOrientation){
        window.addEventListener("deviceorientation", handleOrientation);
    }

    motionListenerAdded = true;
}

// If the browser supports DeviceMotion but doesn't require permission, listen early.
if(supportsDeviceMotion && !requiresPermission){
    addMotionListener();
}

const frictionSlider = document.getElementById("frictionSlider");
const frictionValue = document.getElementById("frictionValue");

const gravityStrengthSlider = document.getElementById("gravityStrengthSlider");
const gravityStrengthValue = document.getElementById("gravityStrengthValue");

const trailToggle = document.getElementById("trailToggle");
const trailAlphaSlider = document.getElementById("trailAlphaSlider");
const trailAlphaValue = document.getElementById("trailAlphaValue");

const glowToggle = document.getElementById("glowToggle");
const glowSlider = document.getElementById("glowSlider");
const glowValue = document.getElementById("glowValue");

const colorModeSelect = document.getElementById("colorMode");
const fixedColorRow = document.getElementById("fixedColorRow");
const fixedColorInput = document.getElementById("fixedColor");

if(frictionSlider){
    frictionSlider.oninput = () => {
        friction = parseFloat(frictionSlider.value);
        frictionValue.textContent = friction.toFixed(3);
    };
}

if(gravityStrengthSlider){
    gravityStrengthSlider.oninput = () => {
        gravityStrength = parseFloat(gravityStrengthSlider.value);
        gravityStrengthValue.textContent = gravityStrength.toFixed(2);
    };
}

if(trailToggle){
    trailToggle.onchange = () => {
        trailEnabled = trailToggle.checked;
    };
}

if(trailAlphaSlider){
    trailAlphaSlider.oninput = () => {
        trailAlpha = parseFloat(trailAlphaSlider.value);
        trailAlphaValue.textContent = trailAlpha.toFixed(2);
    };
}

if(glowToggle){
    glowToggle.onchange = () => {
        glowEnabled = glowToggle.checked;
    };
}

if(glowSlider){
    glowSlider.oninput = () => {
        glowStrength = parseFloat(glowSlider.value);
        glowValue.textContent = glowStrength.toFixed(0);
    };
}

if(colorModeSelect){
    colorModeSelect.onchange = () => {
        colorMode = colorModeSelect.value;
        if(fixedColorRow){
            fixedColorRow.style.display = colorMode === "fixed" ? "flex" : "none";
        }
    };
}

if(fixedColorInput){
    fixedColorInput.oninput = () => {
        fixedColor = fixedColorInput.value;
    };
}

const physicsSteps = 3;
const orbitRadius = 200;
const orbitSpeed = 0.005;
class Ball{

constructor(x,y,r){

this.x=x;
this.y=y;
this.radius=r;

this.vx=(Math.random()-0.5)*6;
this.vy=(Math.random()-0.5)*6;

this.mass=r*r;

this.hue=Math.random()*360;

}

draw(){

    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);

    let fillColor;
    if(colorMode === "fixed"){
        fillColor = fixedColor;
    } else {
        fillColor = `hsl(${this.hue},100%,60%)`;
    }

    ctx.fillStyle = fillColor;

    if(glowEnabled){
        ctx.shadowBlur = glowStrength;
        ctx.shadowColor = fillColor;
    } else {
        ctx.shadowBlur = 0;
    }

    ctx.fill();
    ctx.shadowBlur = 0;

}

applyForces(){

    if(gravityEnabled){
        const now = performance.now();
        const hasRecentMotion = now - lastMotionAt < MOTION_TIMEOUT_MS;

        // If we haven't received motion/orientation data recently, fall back to a simple downward gravity.
        if(!supportsDeviceMotion || !hasRecentMotion){
            this.vy += gravityStrength * 0.5;
        } else {
            this.vx += gravityX;
            this.vy += gravityY;
        }
    }

    this.vx*=friction;
    this.vy*=friction;

}

integrate(){

this.x+=this.vx;
this.y+=this.vy;

}

walls(){

if(this.x+this.radius>canvas.width){
this.x=canvas.width-this.radius;
this.vx*=-wallBounce;
}

if(this.x-this.radius<0){
this.x=this.radius;
this.vx*=-wallBounce;
}

if(this.y+this.radius>canvas.height){
this.y=canvas.height-this.radius;
this.vy*=-wallBounce;
}

if(this.y-this.radius<0){
this.y=this.radius;
this.vy*=-wallBounce;
}

}

update(){

    this.applyForces();
    this.integrate();
    this.walls();

    if(colorMode === "hueCycle"){
        this.hue += 1;
        if(this.hue >= 360) this.hue -= 360;
    }

}

}

const balls=[];

for(let i=0;i<20;i++){

balls.push(new Ball(
Math.random()*canvas.width,
Math.random()*canvas.height,
12+Math.random()*18
));

}

function spawnBalls(n){

    for(let i=0;i<n;i++){

        balls.push(new Ball(
            Math.random()*canvas.width,
            Math.random()*canvas.height,
            6+Math.random()*14
        ));

    }

}

// Ensure spawnBalls is callable from inline event handlers
window.spawnBalls = spawnBalls;

function resolveCollisions(){

for(let i=0;i<balls.length;i++){

for(let j=i+1;j<balls.length;j++){

const b1=balls[i];
const b2=balls[j];

let dx=b2.x-b1.x;
let dy=b2.y-b1.y;

let dist=Math.hypot(dx,dy);
const minDist=b1.radius+b2.radius;

if(dist===0){
dx=0.01;
dy=0;
dist=0.01;
}

if(dist<minDist){

    if(collisionSound){
    collisionSound.currentTime = 0;
    collisionSound.play();
}

const nx=dx/dist;
const ny=dy/dist;

const overlap=minDist-dist;

const m1=b1.mass;
const m2=b2.mass;
const total=m1+m2;

b1.x-=nx*(overlap*(m2/total));
b1.y-=ny*(overlap*(m2/total));

b2.x+=nx*(overlap*(m1/total));
b2.y+=ny*(overlap*(m1/total));

const rvx=b2.vx-b1.vx;
const rvy=b2.vy-b1.vy;

const velAlongNormal=rvx*nx+rvy*ny;

if(velAlongNormal>0) continue;

const restitution=1;

const impulse=-(1+restitution)*velAlongNormal/(1/m1+1/m2);

// Temporarily change color for collision flash
b1.hue = Math.random() * 360;
b2.hue = Math.random() * 360;

const ix=impulse*nx;
const iy=impulse*ny;

if(vibrateEnabled && navigator.vibrate){
    navigator.vibrate(5); // 5ms vibration
}

b1.vx-=ix/m1;
b1.vy-=iy/m1;

b2.vx+=ix/m2;
b2.vy+=iy/m2;

}

}

}

}

let draggedBall=null;
let lastMouse={x:0,y:0};
let velocity={x:0,y:0};

canvas.onmousedown = e => {

    const mx = e.clientX;
    const my = e.clientY;

    for(let b of balls){

        if(Math.hypot(mx - b.x, my - b.y) < b.radius){

            draggedBall = b;
            lastMouse = {x: mx, y: my};

            orbitStartTime = performance.now();
            for(let other of balls){
                delete other.orbitData;
            }

            break;
        }
    }
};

canvas.onmousemove=e=>{

const mx=e.clientX;
const my=e.clientY;

if(draggedBall){

velocity.x=mx-lastMouse.x;
velocity.y=my-lastMouse.y;

draggedBall.x=mx;
draggedBall.y=my;

lastMouse={x:mx,y:my};

}

};

canvas.onmouseup=e=>{

if(draggedBall){

draggedBall.vx=velocity.x;
draggedBall.vy=velocity.y;

}

draggedBall=null;

};

canvas.ondblclick=e=>{
balls.push(new Ball(e.clientX,e.clientY,14+Math.random()*16));
};

let lastTap=0;

canvas.addEventListener("touchstart", e => {

    const t = e.touches[0];
    const mx = t.clientX;
    const my = t.clientY;

    const now = Date.now();

    if(now - lastTap < 300){
        balls.push(new Ball(mx, my, 14));
    }

    lastTap = now;

    for(let b of balls){

        if(Math.hypot(mx - b.x, my - b.y) < b.radius){

            draggedBall = b;
            lastMouse = {x: mx, y: my};

            orbitStartTime = performance.now();
            for(let other of balls){
                delete other.orbitData;
            }

            break;
        }
    }
});

canvas.addEventListener("touchmove",e=>{

const t=e.touches[0];

const mx=t.clientX;
const my=t.clientY;

if(draggedBall){

velocity.x=mx-lastMouse.x;
velocity.y=my-lastMouse.y;

draggedBall.x=mx;
draggedBall.y=my;

lastMouse={x:mx,y:my};

}

});

canvas.addEventListener("touchend",()=>{

if(draggedBall){

draggedBall.vx=velocity.x;
draggedBall.vy=velocity.y;

}

draggedBall=null;

});

function applyOrbit() {
    if (!draggedBall || !orbitEnabled) return;

    const BASE_MIN_SPEED = 0.02;  // minimum base angular speed
    const BASE_MAX_SPEED = 0.06;  // maximum base angular speed

    for (let b of balls) {
        if (b === draggedBall) continue;

        // Initialize orbit data if not present
        if (!b.orbitData) {
            const dx = b.x - draggedBall.x;
            const dy = b.y - draggedBall.y;

            const distance = Math.sqrt(dx * dx + dy * dy);

            // Assign a random base angular speed
            const baseSpeed = BASE_MIN_SPEED + Math.random() * (BASE_MAX_SPEED - BASE_MIN_SPEED);

            b.orbitData = {
                radius: distance,
                angle: Math.atan2(dy, dx),
                speed: baseSpeed
            };
        }

        // Calculate effective orbit speed: keep momentum if it's larger than base
        const currentSpeed = Math.hypot(b.vx, b.vy) / b.orbitData.radius;
        const effectiveSpeed = Math.max(b.orbitData.speed, currentSpeed);

        b.orbitData.angle += effectiveSpeed;

        // Calculate new position along orbit
        const angle = b.orbitData.angle;
        const newX = draggedBall.x + Math.cos(angle) * b.orbitData.radius;
        const newY = draggedBall.y + Math.sin(angle) * b.orbitData.radius;

        // Update velocity so collision system still works naturally
        b.vx = newX - b.x;
        b.vy = newY - b.y;

        // Set new position
        b.x = newX;
        b.y = newY;
    }
}

function animate(){

ctx.fillStyle = `rgba(0,0,0,${trailEnabled ? trailAlpha : 1})`;
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let s=0;s<physicsSteps;s++){


if(!(draggedBall && orbitEnabled)){
    resolveCollisions();
}

for(let b of balls){

    if(orbitEnabled && draggedBall && b !== draggedBall){
        continue;
    }

    if(b !== draggedBall){
        b.update();
    }
}

applyOrbit();


}

for(let b of balls){
b.draw();
}

requestAnimationFrame(animate);

}

animate();

</script>
</body>
</html>
