<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Hub</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #0a0a12, #000);
    font-family: sans-serif;
    color: white;
    overflow: hidden;
}

/* Title */
h1 {
    text-align: center;
    margin-top: 40px;
    font-size: 48px;
    letter-spacing: 2px;
    color: #ff00ff;
}

/* Grid layout */
.menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 30px;
    padding: 60px;
}

/* Game card */
.card {
    position: relative;
    height: 180px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,0,255,0.4);
    cursor: pointer;
    overflow: hidden;
    transition: 0.3s ease;
}

/* Glow effect */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, #ff00ff33, transparent 70%);
    opacity: 0;
    transition: 0.3s;
}

.card:hover::before {
    opacity: 1;
}

/* Hover animation */
.card:hover {
    transform: scale(1.08);
    box-shadow: 0 0 40px #ff00ff88;
}

/* Title inside card */
.card h2 {
    position: absolute;
    bottom: 20px;
    left: 20px;
    margin: 0;
}

/* Optional thumbnail */
.card img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.25;
}
</style>
</head>

<body>

<h1>GAME HUB</h1>

<div class="menu">

    <div class="card" onclick="goToGame('orbit.html')">
        <!-- Optional image -->
        <!-- <img src="orbit.png"> -->
        <h2>Orbit Defense</h2>
    </div>

    <div class="card" onclick="goToGame('Balls.html')">
        <!-- <img src="other.png"> -->
        <h2>BallsBallsBalls</h2>
    </div>

</div>

<script>
function goToGame(file) {
    window.location.href = file;
}
</script>

</body>
</html>
