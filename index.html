<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Hub Mhm :]</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #0a0a12, #000);
    font-family: sans-serif;
    color: white;
    overflow: hidden;
}

h1 {
    text-align: center;
    margin-top: 40px;
    font-size: 48px;
    letter-spacing: 2px;
    color: #0004ff;
}

.menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 30px;
    padding: 60px;
}

.card {
    position: relative;
    height: 180px;
    border-radius: 20px;
    background: rgba(49, 7, 67, 0.171);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(9, 45, 193, 0.4);
    cursor: pointer;
    overflow: hidden;
    transition: 0.3s ease;
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, #101acb33, transparent 70%);
    opacity: 0;
    transition: 0.3s;
}

.card:hover::before {
    opacity: 1;
}

.card:hover {
    transform: scale(1.08);
    box-shadow: 0 0 40px #3ab31288;
}

.card h2 {
    position: absolute;
    bottom: 20px;
    left: 20px;
    margin: 0;
}

.card img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.25;
}
.card:active {
    transform: scale(0.95);
}
body {
    margin: 0;
    background: radial-gradient(circle at center, #0a0a12, #000);
    animation: pulseBg 6s infinite alternate;
}

@keyframes pulseBg {
    0% { background: radial-gradient(circle at center, #0a0a12, #000); }
    100% { background: radial-gradient(circle at center, #111133, #000); }
}
</style>
</head>

<body>

<h1>GAME HUB :)</h1>

<div class="menu">

    <div class="card" onclick="goToGame('Orbit.html')">
        <img src="orbit.png">
        <h2>Orbit Shitty Game</h2>
    </div>

    <div class="card" onclick="goToGame('Balls.html')">
        <img src="balls.png">
        <h2>BallsBallsBalls</h2>
    </div>
    <div class="card" onclick="goToGame('Maze.html')">
        <img src="maze.png">
        <h2>Maze Weeeeeee</h2>
    </div>

</div>

<script>
function goToGame(file) {
    window.location.href = file;
}
</script>

</body>
</html>
