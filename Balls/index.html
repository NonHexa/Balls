<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Orbit Defence Improved</title>
<style>
body { margin:0; overflow:hidden; background:black; font-family:sans-serif; user-select:none; }
canvas { display:block; }
.info { position:fixed; top:10px; left:10px; color:white; font-size:16px; }
#upgradeMenu { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background: rgba(15,15,15,0.95); padding:20px; border-radius:12px; display:none; color:white; }
</style>
</head>
<body>
<div class="info" id="info">Points: 0</div>
<canvas id="gameCanvas"></canvas>

<div id="upgradeMenu">
<h2>Upgrade Tree</h2>
<canvas id="upgradeCanvas" width="400" height="300"></canvas>
<br>
<button id="playAgain">Play Again</button>
</div>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let center={x:canvas.width/2,y:canvas.height/2};

let points=0;
let gameOver=false;
let particles=[];
let shakeTime=0;

const infoDiv=document.getElementById("info");

window.addEventListener("resize",()=>{
 canvas.width=window.innerWidth;
 canvas.height=window.innerHeight;
 center={x:canvas.width/2,y:canvas.height/2};
});

function screenShake(){
 if(shakeTime>0){
  const dx=(Math.random()-0.5)*10;
  const dy=(Math.random()-0.5)*10;
  ctx.translate(dx,dy);
  shakeTime--;
 }
}

class Particle{
 constructor(x,y,color){
  this.x=x; this.y=y;
  this.vx=(Math.random()-0.5)*5;
  this.vy=(Math.random()-0.5)*5;
  this.life=30;
  this.color=color;
 }
 update(){this.x+=this.vx; this.y+=this.vy; this.life--;}
 draw(){ctx.fillStyle=this.color; ctx.fillRect(this.x,this.y,3,3);} 
}

class PlayerBall{
 constructor(){this.orbitRadius=150; this.angle=0; this.size=16;}
 update(mx,my){
  if(mx!==null){this.angle=Math.atan2(my-center.y,mx-center.x);} 
  this.x=center.x+Math.cos(this.angle)*this.orbitRadius;
  this.y=center.y+Math.sin(this.angle)*this.orbitRadius;
 }
 draw(){ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle="#fff"; ctx.fill();}
}

class OrbitBall{
 constructor(angle){this.angle=angle; this.orbitRadius=60; this.size=14; this.angularSpeed=0.02;}
 update(centerAngle,i,total){
  const target=centerAngle+i*(Math.PI*2/total);
  this.angle+=(target-this.angle)*0.1+this.angularSpeed;
  this.angle+=Math.sin(Date.now()*0.002+i)*0.01;
  this.x=center.x+Math.cos(this.angle)*this.orbitRadius;
  this.y=center.y+Math.sin(this.angle)*this.orbitRadius;
 }
 draw(){ctx.beginPath(); ctx.arc(this.x,this.y,this.size,0,Math.PI*2); ctx.fillStyle="#0ff"; ctx.fill();}
}

const enemyTypes=[
 {color:"#f00", size:8, gravity:0.3, life:1, speedMultiplier:2}, // fast
 {color:"#ff8800", size:14, gravity:0.2, life:2, speedMultiplier:1.2}, // medium (starter)
 {color:"#8800ff", size:20, gravity:0.15, life:3, speedMultiplier:0.8} // slow tank
];

let spawnCount = 0;

class Enemy{
 constructor(typeOverride=null){

  let t;

  if(typeOverride){
    t = typeOverride;
  } else {
    spawnCount++;

    if(spawnCount < 5){
      t = enemyTypes[1];
    } else if(spawnCount < 15){
      t = Math.random() < 0.7 ? enemyTypes[1] : enemyTypes[2];
    } else {
      const r = Math.random();
      if(r < 0.5) t = enemyTypes[1];
      else if(r < 0.8) t = enemyTypes[2];
      else t = enemyTypes[0];
    }
  }

  this.size = t.size;
  this.color = t.color;
  this.gravity = t.gravity;
  this.life = t.life;
  this.speedMultiplier = t.speedMultiplier;

  const edge=Math.random();
  this.edge = edge;

  if(edge<0.25){this.x=0; this.y=Math.random()*canvas.height;}
  else if(edge<0.5){this.x=canvas.width; this.y=Math.random()*canvas.height;}
  else if(edge<0.75){this.x=Math.random()*canvas.width; this.y=0;}
  else{this.x=Math.random()*canvas.width; this.y=canvas.height;}

  this.vx=0;
  this.vy=0;
 }
}

let player=new PlayerBall();
let orbitBalls=[new OrbitBall(0)];
let enemies=[];
let mouse={x:null,y:null};

canvas.addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY;});

// Difficulty scaling
let enemyInterval;
function startEnemySpawn(){
 clearInterval(enemyInterval);

 enemyInterval = setInterval(()=>{
  if(gameOver) return;

  if(enemies.length < 100){

    // chance to spawn fast enemy with warning
    if(spawnCount > 15 && Math.random() < 0.2){

      const edge = Math.random();

      // spawn warning particles
      for(let i=0;i<50;i++){
        let x,y;

        if(edge<0.25){x=0; y=Math.random()*canvas.height;}
        else if(edge<0.5){x=canvas.width; y=Math.random()*canvas.height;}
        else if(edge<0.75){x=Math.random()*canvas.width; y=0;}
        else{x=Math.random()*canvas.width; y=canvas.height;}

        particles.push(new Particle(x,y,"#ff2222"));
      }

      // delay spawn (gives player reaction time)
      setTimeout(()=>{
        enemies.push(new Enemy(enemyTypes[0])); // fast enemy
      }, 500);

    } else {
      enemies.push(new Enemy());
    }

  }
 },300);
}


function checkCollisions(){
 for(let e of enemies){
  for(let b of [player,...orbitBalls]){
   const dx=e.x-b.x;
   const dy=e.y-b.y;
   const dist=Math.hypot(dx,dy);
   if(dist<e.size+b.size){
    shakeTime=5;
    e.life--;
    points++;
    infoDiv.textContent="Points: "+points;
    for(let i=0;i<10;i++) particles.push(new Particle(e.x,e.y,e.color));
   }
  }
  if(Math.hypot(e.x-center.x,e.y-center.y)<20){
   gameOver=true;
   document.getElementById("upgradeMenu").style.display="block";
  }
 }
}

// Upgrade blocks
const upgrades=[
 {name:"+Orbit", cost:5, level:0, max:5, x:80,y:80,color:"#0ff"},
 {name:"Radius", cost:10, level:0, max:5, x:200,y:80,color:"#0f0"},
 {name:"Speed", cost:15, level:0, max:5, x:320,y:80,color:"#ff0"}
];

const uctx=document.getElementById("upgradeCanvas").getContext("2d");

function drawTree(){
 uctx.clearRect(0,0,400,300);
 for(let u of upgrades){
  uctx.fillStyle=u.level>0?u.color:"#333";
  uctx.fillRect(u.x-30,u.y-30,60,60);
  uctx.fillStyle="#fff";
  uctx.fillText(u.name,u.x,u.y+40);
 }
}

drawTree();

upgradeCanvas.onclick=(e)=>{
 const rect=upgradeCanvas.getBoundingClientRect();
 const mx=e.clientX-rect.left;
 const my=e.clientY-rect.top;

 for(let u of upgrades){
  if(mx>u.x-30 && mx<u.x+30 && my>u.y-30 && my<u.y+30){
   if(points>=u.cost && u.level<u.max){
    points=0;
    u.level++;

    for(let i=0;i<20;i++) particles.push(new Particle(u.x,u.y,u.color));

    if(u.name=="+Orbit") orbitBalls.push(new OrbitBall(Math.random()*Math.PI*2));
    if(u.name=="Radius") player.orbitRadius+=20;
    if(u.name=="Speed") orbitBalls.forEach(o=>o.angularSpeed+=0.01);

    drawTree();
   }
  }
 }
};

function resetGame(){
 points = 0;
 infoDiv.textContent = "Points: 0";
 gameOver = false;
 enemies = [];
 particles = [];
 orbitBalls = [new OrbitBall(0)];
 player = new PlayerBall();
 document.getElementById("upgradeMenu").style.display = "none";
 startEnemySpawn();
 startEnemySpawn();
animate();
}

document.getElementById("playAgain").onclick = resetGame;

function animate(){
 ctx.save();
 screenShake();

 ctx.fillStyle="rgba(0,0,0,0.2)";
 ctx.fillRect(0,0,canvas.width,canvas.height);

 ctx.beginPath(); ctx.arc(center.x,center.y,20,0,Math.PI*2); ctx.fillStyle="#fff"; ctx.fill();

 player.update(mouse.x,mouse.y);
 player.draw();

 orbitBalls.forEach((o,i)=>{o.update(player.angle,i,orbitBalls.length); o.draw();});

 enemies.forEach(e=>{e.update(); e.draw();});

 particles.forEach(p=>{p.update(); p.draw();});
 particles=particles.filter(p=>p.life>0);

 checkCollisions();
 enemies=enemies.filter(e=>e.life>0);

 ctx.restore();

 if(!gameOver) requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
