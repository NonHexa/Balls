<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Balls Version 2 :)</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #0a0a0a;
        font-family: sans-serif;
        user-select: none;
    }
    canvas { display: block; }
    #backBtn {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 101;
        padding: 8px 14px;
        border-radius: 6px;
        border: 1px solid #555;
        background: rgba(30, 30, 30, 0.85);
        color: #ccc;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    #backBtn:hover { background: rgba(60,60,60,0.9); color: #fff; }
    #toolbar {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 101;
        display: flex;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 10px;
        background: rgba(20,20,20,0.88);
        border: 1px solid #444;
    }
    .tbtn {
        padding: 6px 14px;
        border-radius: 6px;
        border: 1px solid #555;
        background: rgba(50,50,50,0.9);
        color: #ccc;
        cursor: pointer;
        font-size: 14px;
        transition: 0.15s;
    }
    .tbtn:hover { background: rgba(80,80,80,0.95); color: #fff; }
    .tbtn.active { background: rgba(100,60,200,0.7); border-color: #a070ff; color: #fff; }
    #hint {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(255,255,255,0.15);
        font-size: 20px;
        text-align: center;
        pointer-events: none;
        z-index: 50;
        transition: opacity 1s;
    }
</style>
</head>
<body>
<button id="backBtn">← Menu</button>
<canvas id="c"></canvas>
<div id="hint">Click & drag to launch balls<br>Hold longer for bigger balls</div>
<div id="toolbar">
    <button class="tbtn active" id="btnGravity">Gravity</button>
    <button class="tbtn" id="btnTrails">Trails</button>
    <button class="tbtn" id="btnRepel">Repel</button>
    <button class="tbtn" id="btnRainbow">Rainbow</button>
    <button class="tbtn" id="btnClear">Clear All</button>
</div>

<script>
document.getElementById("backBtn").onclick = () => { window.location.href = "index.html"; };

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
window.addEventListener("resize", resize);

// ── Audio ──
let audioCtx = null, masterGain = null;
function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.15;
    masterGain.connect(audioCtx.destination);
}
function playBounce(speed, size) {
    if (!audioCtx) initAudio();
    if (audioCtx.state === "suspended") audioCtx.resume();
    const freq = 100 + (1 - Math.min(size, 60) / 60) * 600 + Math.random() * 60;
    const vol = Math.min(0.3, speed / 30);
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.value = freq;
    g.gain.value = 0;
    osc.connect(g);
    g.connect(masterGain);
    const t = audioCtx.currentTime;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.start(t);
    osc.stop(t + 0.3);
}

// ── State ──
let gravity = true;
let trails = false;
let repelMode = false;
let rainbowMode = false;
const balls = [];
const GRAVITY = 0.35;
const FRICTION = 0.998;
const BOUNCE = 0.75;
const MAX_BALLS = 300;

// ── Colors ──
const PALETTE = [
    "#ff4466", "#ff7744", "#ffcc33", "#66ff66", "#44ccff",
    "#7766ff", "#ff66cc", "#ff9966", "#33ffcc", "#ff5555",
    "#88aaff", "#ffdd55", "#66ffaa", "#cc77ff", "#ff8888"
];
let hueShift = 0;
function randomColor() {
    if (rainbowMode) {
        hueShift = (hueShift + 37) % 360;
        return `hsl(${hueShift}, 85%, 60%)`;
    }
    return PALETTE[Math.floor(Math.random() * PALETTE.length)];
}

// ── Ball ──
class Ball {
    constructor(x, y, vx, vy, r, color) {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.r = r;
        this.color = color;
        this.trail = [];
        this.squash = 1;
        this.stretch = 1;
    }
    update(dt) {
        if (gravity) this.vy += GRAVITY * dt;
        this.vx *= FRICTION;
        this.vy *= FRICTION;
        this.x += this.vx * dt;
        this.y += this.vy * dt;

        // Squash/stretch based on velocity
        const speed = Math.hypot(this.vx, this.vy);
        const factor = Math.min(speed / 20, 0.35);
        this.squash = 1 - factor * 0.5;
        this.stretch = 1 + factor * 0.5;

        // Wall bounce
        if (this.x - this.r < 0) {
            this.x = this.r;
            this.vx = Math.abs(this.vx) * BOUNCE;
            playBounce(Math.abs(this.vx), this.r);
        } else if (this.x + this.r > W) {
            this.x = W - this.r;
            this.vx = -Math.abs(this.vx) * BOUNCE;
            playBounce(Math.abs(this.vx), this.r);
        }
        if (this.y - this.r < 0) {
            this.y = this.r;
            this.vy = Math.abs(this.vy) * BOUNCE;
            playBounce(Math.abs(this.vy), this.r);
        } else if (this.y + this.r > H) {
            this.y = H - this.r;
            this.vy = -Math.abs(this.vy) * BOUNCE;
            playBounce(Math.abs(this.vy), this.r);
        }

        // Trail
        if (trails) {
            this.trail.push({ x: this.x, y: this.y });
            if (this.trail.length > 30) this.trail.shift();
        } else if (this.trail.length) {
            this.trail = [];
        }
    }
    draw() {
        // Trail
        if (this.trail.length > 1) {
            ctx.beginPath();
            ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for (let i = 1; i < this.trail.length; i++) {
                ctx.lineTo(this.trail[i].x, this.trail[i].y);
            }
            ctx.strokeStyle = this.color + "40";
            ctx.lineWidth = this.r * 0.8;
            ctx.lineCap = "round";
            ctx.stroke();
        }

        // Ball with squash/stretch
        ctx.save();
        ctx.translate(this.x, this.y);
        const angle = Math.atan2(this.vy, this.vx);
        ctx.rotate(angle);
        ctx.scale(this.stretch, this.squash);

        // Glow
        ctx.shadowBlur = 18;
        ctx.shadowColor = this.color;

        // Main ball
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();

        // Highlight
        ctx.beginPath();
        ctx.arc(-this.r * 0.25, -this.r * 0.25, this.r * 0.35, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.25)";
        ctx.fill();

        ctx.shadowBlur = 0;
        ctx.restore();
    }
}

// ── Ball-Ball Collision (elastic) ──
function collideBalls() {
    for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
            const a = balls[i], b = balls[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.hypot(dx, dy);
            const minD = a.r + b.r;
            if (dist < minD && dist > 0.01) {
                // Separate
                const overlap = (minD - dist) / 2;
                const nx = dx / dist;
                const ny = dy / dist;
                a.x -= nx * overlap;
                a.y -= ny * overlap;
                b.x += nx * overlap;
                b.y += ny * overlap;

                // Elastic collision (mass proportional to area)
                const mA = a.r * a.r;
                const mB = b.r * b.r;
                const dvx = a.vx - b.vx;
                const dvy = a.vy - b.vy;
                const dot = dvx * nx + dvy * ny;
                if (dot > 0) {
                    const impulse = (2 * dot) / (mA + mB);
                    a.vx -= impulse * mB * nx * BOUNCE;
                    a.vy -= impulse * mB * ny * BOUNCE;
                    b.vx += impulse * mA * nx * BOUNCE;
                    b.vy += impulse * mA * ny * BOUNCE;
                    playBounce(Math.abs(dot) * 0.5, (a.r + b.r) / 2);
                }
            }
        }
    }
}

// ── Mouse Repel ──
let mouseX = W / 2, mouseY = H / 2;
let mouseDown = false;
function applyRepel() {
    if (!repelMode || !mouseDown) return;
    for (const b of balls) {
        const dx = b.x - mouseX;
        const dy = b.y - mouseY;
        const dist = Math.hypot(dx, dy);
        if (dist < 200 && dist > 1) {
            const force = (200 - dist) / 200 * 2.5;
            b.vx += (dx / dist) * force;
            b.vy += (dy / dist) * force;
        }
    }
}

// ── Drag Launch ──
let dragging = false;
let dragStartX = 0, dragStartY = 0;
let dragStartTime = 0;

function getPointer(e) {
    if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    return { x: e.clientX, y: e.clientY };
}

function onDown(e) {
    if (e.target !== canvas) return;
    if (!audioCtx) initAudio();
    const p = getPointer(e);
    dragging = true;
    dragStartX = p.x;
    dragStartY = p.y;
    dragStartTime = performance.now();
    mouseDown = true;
    hintEl.style.opacity = "0";
}
function onMove(e) {
    const p = e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };
    mouseX = p.x;
    mouseY = p.y;
}
function onUp(e) {
    mouseDown = false;
    if (!dragging) return;
    dragging = false;
    const p = e.changedTouches
        ? { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY }
        : { x: e.clientX, y: e.clientY };

    const holdTime = (performance.now() - dragStartTime) / 1000;
    const radius = Math.min(8 + holdTime * 25, 60);

    const dx = dragStartX - p.x;
    const dy = dragStartY - p.y;
    const vx = dx * 0.15;
    const vy = dy * 0.15;

    if (balls.length >= MAX_BALLS) balls.shift();
    balls.push(new Ball(dragStartX, dragStartY, vx, vy, radius, randomColor()));
}

canvas.addEventListener("mousedown", onDown);
canvas.addEventListener("mousemove", onMove);
window.addEventListener("mouseup", onUp);
canvas.addEventListener("touchstart", onDown, { passive: true });
canvas.addEventListener("touchmove", onMove, { passive: true });
window.addEventListener("touchend", onUp);

// ── Draw drag arrow ──
function drawDragArrow() {
    if (!dragging) return;
    const holdTime = (performance.now() - dragStartTime) / 1000;
    const radius = Math.min(8 + holdTime * 25, 60);

    // Preview ball
    ctx.beginPath();
    ctx.arc(dragStartX, dragStartY, radius, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.lineWidth = 2;
    ctx.stroke();

    // Arrow
    const dx = dragStartX - mouseX;
    const dy = dragStartY - mouseY;
    const len = Math.hypot(dx, dy);
    if (len > 10) {
        ctx.beginPath();
        ctx.moveTo(dragStartX, dragStartY);
        ctx.lineTo(dragStartX + dx * 0.5, dragStartY + dy * 0.5);
        ctx.strokeStyle = "rgba(255,255,255,0.3)";
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 4]);
        ctx.stroke();
        ctx.setLineDash([]);
    }
}

// ── Toolbar ──
const hintEl = document.getElementById("hint");
function toggle(btn, getter, setter) {
    btn.addEventListener("click", () => {
        setter(!getter());
        btn.classList.toggle("active", getter());
    });
}
toggle(document.getElementById("btnGravity"), () => gravity, v => gravity = v);
toggle(document.getElementById("btnTrails"), () => trails, v => trails = v);
toggle(document.getElementById("btnRepel"), () => repelMode, v => repelMode = v);
toggle(document.getElementById("btnRainbow"), () => rainbowMode, v => rainbowMode = v);
document.getElementById("btnClear").addEventListener("click", () => { balls.length = 0; });

// ── Main Loop ──
let lastTime = performance.now();
function frame(now) {
    const delta = Math.min(now - lastTime, 50);
    lastTime = now;
    const dt = delta / 16.67;

    // Background
    if (trails) {
        ctx.fillStyle = "rgba(10,10,10,0.12)";
    } else {
        ctx.fillStyle = "#0a0a0a";
    }
    ctx.fillRect(0, 0, W, H);

    applyRepel();
    for (const b of balls) b.update(dt);
    collideBalls();
    for (const b of balls) b.draw();
    drawDragArrow();

    // Ball count
    ctx.fillStyle = "rgba(255,255,255,0.12)";
    ctx.font = "14px sans-serif";
    ctx.fillText(balls.length + " balls", 12, 24);

    requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
