canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

let friction = 0.995;
const wallBounce = 0.99999;

let gravityEnabled = false;

let gravityX = 0;
let gravityY = 0;
let gravityStrength = 0.2;
let motionListenerAdded = false;

const supportsDeviceMotion = typeof DeviceMotionEvent !== "undefined";
const supportsDeviceOrientation = typeof DeviceOrientationEvent !== "undefined";
const requiresPermission = supportsDeviceMotion && typeof DeviceMotionEvent.requestPermission === "function";

let trailEnabled = true;
let trailAlpha = 0.15;

let glowEnabled = true;

// ── Web Audio chord system ──────────────────────────────────
let audioCtx = null;
let masterGain = null;
let audioStarted = false;
let reverbNode = null;

function createReverbBuffer(ctx, duration, decay) {
    const rate = ctx.sampleRate;
    const len = rate * duration;
    const buf = ctx.createBuffer(2, len, rate);
    for (let ch = 0; ch < 2; ch++) {
        const data = buf.getChannelData(ch);
        for (let i = 0; i < len; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
        }
    }
    return buf;
}

function initAudio() {
    if (audioStarted) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.30;

    reverbNode = audioCtx.createConvolver();
    reverbNode.buffer = createReverbBuffer(audioCtx, 2.5, 3.0);
    const reverbGain = audioCtx.createGain();
    reverbGain.gain.value = 0.50;
    reverbNode.connect(reverbGain);
    reverbGain.connect(audioCtx.destination);

    masterGain.connect(audioCtx.destination);
    masterGain.connect(reverbNode);

    audioStarted = true;
}

function ensureAudio() {
    if (!audioStarted) initAudio();
    else if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
window.addEventListener("click", ensureAudio, { once: false });
window.addEventListener("touchstart", ensureAudio, { once: false });

// Chord dictionary — the system slowly crossfades between these
const chordDict = [
    { name: "Cmaj9",   root: 130.81, semitones: [0, 4, 7, 11, 14] },
    { name: "Am7",     root: 110.00, semitones: [0, 3, 7, 10] },
    { name: "Fmaj7",   root: 174.61, semitones: [0, 4, 7, 11] },
    { name: "G13",     root: 196.00, semitones: [0, 4, 7, 10, 14, 21] },
    { name: "Dm9",     root: 146.83, semitones: [0, 3, 7, 10, 14] },
    { name: "Em7",     root: 164.81, semitones: [0, 3, 7, 10] }
];

let currentChordIdx = 0;
let nextChordIdx = 1;
let chordBlend = 0;          // 0 = fully current, 1 = fully next
const CHORD_TRANSITION_TIME = 8000; // ms to fully cross-fade
let chordTimer = 0;
let lastChordTime = 0;

function buildChordFreqs(chord) {
    return chord.semitones.map(st => chord.root * Math.pow(2, st / 12));
}

// Get a blended note: pick from current or next chord based on blend amount
function getCollisionFreq(speed) {
    const curFreqs = buildChordFreqs(chordDict[currentChordIdx]);
    const nxtFreqs = buildChordFreqs(chordDict[nextChordIdx]);

    // Map collision speed to a note index within the chord
    const maxSpeed = 12;
    const norm = Math.min(speed, maxSpeed) / maxSpeed;

    const curIdx = Math.floor(norm * (curFreqs.length - 1));
    const nxtIdx = Math.floor(norm * (nxtFreqs.length - 1));

    const curFreq = curFreqs[curIdx];
    const nxtFreq = nxtFreqs[nxtIdx];

    // Smooth blend between chords via logarithmic interpolation
    const logCur = Math.log2(curFreq);
    const logNxt = Math.log2(nxtFreq);
    return Math.pow(2, logCur + (logNxt - logCur) * chordBlend);
}

function updateChordTransition(now) {
    if (lastChordTime === 0) { lastChordTime = now; return; }

    const elapsed = now - lastChordTime;
    chordBlend = Math.min(1, elapsed / CHORD_TRANSITION_TIME);

    if (chordBlend >= 1) {
        // Transition complete — move to next chord pair
        currentChordIdx = nextChordIdx;
        nextChordIdx = (nextChordIdx + 1) % chordDict.length;
        chordBlend = 0;
        lastChordTime = now;
    }
}

function playCollisionTone(speed) {
    if (!audioStarted || !audioCtx) return;

    const freq = getCollisionFreq(speed);

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.value = freq;
    gain.gain.value = 0;
    osc.connect(gain);
    gain.connect(masterGain);

    const t = audioCtx.currentTime;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.18, t + 0.03);
    gain.gain.setValueAtTime(0.18, t + 0.06);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
    osc.start(t);
    osc.stop(t + 0.75);
}


let colorMode = "random";
let fixedColor = "#ff0000";

window.addEventListener("click", (e) => {

// orbit toggle listener :) Bethan this make is so the code can check if it is toggled incase you wondered
const orbitToggle = document.getElementById("orbitToggle");
let orbitEnabled = true;

if(orbitToggle){
    orbitToggle.onchange = () => {
        orbitEnabled = orbitToggle.checked;
    };
}

let lastMotionAt = 0;
const MOTION_TIMEOUT_MS = 500; // if no motion data received recently, fall back to downward gravity

function setGravityHint(text){
    if(gravityHint){
        gravityHint.textContent = text;
    }
}

gravityToggle.onchange = async e => {
    gravityEnabled = e.target.checked;

    if (gravityEnabled) {
        setGravityHint("Requesting motion access...");
        await requestMotionPermission();
    } else {
        setGravityHint("Tap Gravity to enable motion on mobile");
    }
};

function handleMotion(event){

    const acc = event.accelerationIncludingGravity || event.acceleration;
    if(!acc) return;

    let ax = acc.x;
    let ay = acc.y;

    // scale to match existing gravity strength
    gravityX = (-ax / 9.8) * gravityStrength;
    gravityY = (ay / 9.8) * gravityStrength;

    lastMotionAt = performance.now();
}

function getCellKey(x, y) {
    const cx = Math.floor(x / CELL_SIZE);
    const cy = Math.floor(y / CELL_SIZE);
    return `${cx},${cy}`;
}

function buildGrid() {
    grid.clear();

    for (let b of balls) {
        const key = getCellKey(b.x, b.y);

        if (!grid.has(key)) {
            grid.set(key, []);
        }

        grid.get(key).push(b);
    }
}

function getNearbyCells(x, y) {
    const cx = Math.floor(x / CELL_SIZE);
    const cy = Math.floor(y / CELL_SIZE);

    const neighbors = [];

    for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
            neighbors.push(`${cx + dx},${cy + dy}`);
        }
    }

    return neighbors;
}

function handleOrientation(event){

    if(event.beta === null || event.gamma === null) return;

    // left/right tilt
    let tiltX = event.gamma;

    // forward/back tilt
    let tiltY = event.beta;

    // normalize values
    tiltX = Math.max(-45, Math.min(45, tiltX)) / 45;
    tiltY = Math.max(-45, Math.min(45, tiltY)) / 45;

    gravityX = tiltX * gravityStrength;
    gravityY = tiltY * gravityStrength;

    lastMotionAt = performance.now();
}

async function requestMotionPermission(){
    if(typeof DeviceMotionEvent !== "undefined" &&
       typeof DeviceMotionEvent.requestPermission === "function"){
        try{
            const response = await DeviceMotionEvent.requestPermission();

            if(response === "granted"){
                addMotionListener();
                setGravityHint("Gravity enabled. Tilt your device.");
            } else {
                gravityEnabled = false;
                gravityToggle.checked = false;
                setGravityHint("Motion access denied. Gravity disabled.");
                alert("Motion access denied. Gravity disabled.");
            }
        }catch(e){
            console.log(e);
        }
    } else {
        addMotionListener();
        setGravityHint("Gravity enabled. Tilt your device.");
    }
}

function addMotionListener(){
    if(motionListenerAdded) return;

    if(supportsDeviceMotion){
        window.addEventListener("devicemotion", handleMotion);
    }

    if(supportsDeviceOrientation){
        window.addEventListener("deviceorientation", handleOrientation);
    }

    motionListenerAdded = true;
}

if(supportsDeviceMotion && !requiresPermission){
    addMotionListener();
}

const physicsSteps = 3;
const orbitRadius = 200;
const orbitSpeed = 0.005;
class Ball{

constructor(x,y,r){

this.id = BALL_ID++;
this.x=x;
this.y=y;
this.radius=r;

this.vx=(Math.random()-0.5)*6;
this.vy=(Math.random()-0.5)*6;

this.mass=r*r;

this.hue=Math.random()*360;

}

draw(){

    ctx.beginPath();
    ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);

    let fillColor;
    if(colorMode === "fixed"){
        fillColor = fixedColor;
    } else {
        fillColor = `hsl(${this.hue},100%,60%)`;
    }

    ctx.fillStyle = fillColor;

    if(glowEnabled){
        ctx.shadowBlur = glowStrength;
        ctx.shadowColor = fillColor;
    } else {
        ctx.shadowBlur = 0;
    }

    ctx.fill();
    ctx.shadowBlur = 0;

}

applyForces(){

    if(gravityEnabled){
        const now = performance.now();
        const hasRecentMotion = now - lastMotionAt < MOTION_TIMEOUT_MS;

        // If we haven't received motion/orientation data recently, fall back to a simple downward gravity.
        if(!supportsDeviceMotion || !hasRecentMotion){
            this.vy += gravityStrength * 0.5;
        } else {
            this.vx += gravityX;
            this.vy += gravityY;
        }
    }

    this.vx*=friction;
    this.vy*=friction;

}

integrate(){

this.x+=this.vx;
this.y+=this.vy;

}

walls(){

if(this.x+this.radius>canvas.width){
this.x=canvas.width-this.radius;
this.vx*=-wallBounce;
}

if(this.x-this.radius<0){
this.x=this.radius;
this.vx*=-wallBounce;
}

if(this.y+this.radius>canvas.height){
this.y=canvas.height-this.radius;
this.vy*=-wallBounce;
}

if(this.y-this.radius<0){
this.y=this.radius;
this.vy*=-wallBounce;
}

}

update(){

    this.applyForces();
    this.integrate();
    this.walls();

    if(colorMode === "hueCycle"){
        this.hue += 0.1;
        if(this.hue >= 360) this.hue -= 360;
    }

}

}

const balls=[];

for(let i=0;i<20;i++){

balls.push(new Ball(
Math.random()*canvas.width,
Math.random()*canvas.height,
12+Math.random()*18
));

}

function spawnBalls(n){

    for(let i=0;i<n;i++){

        balls.push(new Ball(
            Math.random()*canvas.width,
            Math.random()*canvas.height,
            6+Math.random()*14
        ));

    }

}

// Ensure spawnBalls is callable from inline event handlers
window.spawnBalls = spawnBalls;

function resolveCollisions() {

    buildGrid();

    for (let b1 of balls) {

        const nearbyKeys = getNearbyCells(b1.x, b1.y);

        for (let key of nearbyKeys) {

            const cell = grid.get(key);
            if (!cell) continue;

            for (let b2 of cell) {

                if (b1 === b2 || b1.id >= b2.id) continue;

                let dx = b2.x - b1.x;
                let dy = b2.y - b1.y;

                let distSq = dx*dx + dy*dy;
                const minDist = b1.radius + b2.radius;

                if (distSq >= minDist * minDist) continue;

                let dist = Math.sqrt(distSq);

                if (dist === 0) {
                    dx = 0.01;
                    dy = 0;
                    dist = 0.01;
                }

                const nx = dx / dist;
                const ny = dy / dist;

                const overlap = minDist - dist;

                const m1 = b1.mass;
                const m2 = b2.mass;
                const total = m1 + m2;

                // Separate
                b1.x -= nx * (overlap * (m2 / total));
                b1.y -= ny * (overlap * (m2 / total));

                b2.x += nx * (overlap * (m1 / total));
                b2.y += ny * (overlap * (m1 / total));

                const rvx = b2.vx - b1.vx;
                const rvy = b2.vy - b1.vy;

                const velAlongNormal = rvx * nx + rvy * ny;
                if (velAlongNormal > 0) continue;

                const impulse = -(1 + 1) * velAlongNormal / (1/m1 + 1/m2);

                const ix = impulse * nx;
                const iy = impulse * ny;

                b1.vx -= ix / m1;
                b1.vy -= iy / m1;

                b2.vx += ix / m2;
                b2.vy += iy / m2;

                // Play chord tone based on collision impact speed
                const impactSpeed = Math.abs(velAlongNormal);
                if (impactSpeed > 0.5) playCollisionTone(impactSpeed);
            }
        }
    }
}

let draggedBall=null;
let lastMouse={x:0,y:0};
let velocity={x:0,y:0};

canvas.onmousedown = e => {

    const mx = e.clientX;
    const my = e.clientY;

    for(let b of balls){

        if(Math.hypot(mx - b.x, my - b.y) < b.radius){

            draggedBall = b;
            lastMouse = {x: mx, y: my};

            orbitStartTime = performance.now();
            for(let other of balls){
                delete other.orbitData;
            }

            break;
        }
    }
};

canvas.onmousemove=e=>{

const mx=e.clientX;
const my=e.clientY;

if(draggedBall){

velocity.x=mx-lastMouse.x;
velocity.y=my-lastMouse.y;

draggedBall.x=mx;
draggedBall.y=my;

lastMouse={x:mx,y:my};

}

};

canvas.onmouseup=e=>{

if(draggedBall){

draggedBall.vx=velocity.x;
draggedBall.vy=velocity.y;

}

draggedBall=null;

};

canvas.ondblclick=e=>{
balls.push(new Ball(e.clientX,e.clientY,14+Math.random()*16));
};

let lastTap=0;

canvas.addEventListener("touchstart", e => {

    const t = e.touches[0];
    const mx = t.clientX;
    const my = t.clientY;

    const now = Date.now();

    if(now - lastTap < 300){
        balls.push(new Ball(mx, my, 14));
    }

    lastTap = now;

    for(let b of balls){

        if(Math.hypot(mx - b.x, my - b.y) < b.radius){

            draggedBall = b;
            lastMouse = {x: mx, y: my};

            orbitStartTime = performance.now();
            for(let other of balls){
                delete other.orbitData;
            }

            break;
        }
    }
});

canvas.addEventListener("touchmove",e=>{

const t=e.touches[0];

const mx=t.clientX;
const my=t.clientY;

if(draggedBall){

velocity.x=mx-lastMouse.x;
velocity.y=my-lastMouse.y;

draggedBall.x=mx;
draggedBall.y=my;

lastMouse={x:mx,y:my};

}

});

canvas.addEventListener("touchend",()=>{

if(draggedBall){

draggedBall.vx=velocity.x;
draggedBall.vy=velocity.y;

}

draggedBall=null;

});

function applyOrbit() {
    if (!draggedBall || !orbitEnabled) return;

    const BASE_MIN_SPEED = 0.002;  // minimum base angular speed
    const BASE_MAX_SPEED = 0.02;  // maximum base angular speed

    for (let b of balls) {
        if (b === draggedBall) continue;

        // Initialize orbit data if not present
        if (!b.orbitData) {
            const dx = b.x - draggedBall.x;
            const dy = b.y - draggedBall.y;

            const distance = Math.sqrt(dx * dx + dy * dy);

            // Assign a random base angular speed
            const baseSpeed = BASE_MIN_SPEED + Math.random() * (BASE_MAX_SPEED - BASE_MIN_SPEED);

            b.orbitData = {
                radius: distance,
                angle: Math.atan2(dy, dx),
                speed: baseSpeed
            };
        }

        // Calculate effective orbit speed: keep momentum if it's larger than base
        const currentSpeed = Math.hypot(b.vx, b.vy) / b.orbitData.radius;
        const effectiveSpeed = Math.max(b.orbitData.speed, currentSpeed);

        b.orbitData.angle += b.orbitData.speed;

        // Calculate new position along orbit
        const angle = b.orbitData.angle;
        const newX = draggedBall.x + Math.cos(angle) * b.orbitData.radius;
        const newY = draggedBall.y + Math.sin(angle) * b.orbitData.radius;

        // Update velocity so collision system still works naturally
        b.vx = newX - b.x;
        b.vy = newY - b.y;

        // Set new position
        b.x = newX;
        b.y = newY;
    }
}

function animate(){

updateChordTransition(performance.now());

ctx.fillStyle = `rgba(0,0,0,${trailEnabled ? trailAlpha : 1})`;
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let s=0;s<physicsSteps;s++){


if(!(draggedBall && orbitEnabled)){
    resolveCollisions();
}

for(let b of balls){

    if(orbitEnabled && draggedBall && b !== draggedBall){
        continue;
    }

    if(b !== draggedBall){
        b.update();
    }
}

applyOrbit();


}

for(let b of balls){
b.draw();
}

requestAnimationFrame(animate);

}

animate();

</script>
