<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Orbit Wave Survival Thingy Mhmmmm</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: sans-serif;
        user-select: none;
    }

    canvas {
        display: block;
    }

    #gameCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
    }

    .info {
        position: fixed;
        top: 14px;
        left: 14px;
        z-index: 100;
        color: #fff;
        background: rgba(0, 0, 0, 0.45);
        padding: 8px 14px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 20px;
        line-height: 1.3;
        pointer-events: none;
        text-shadow: 0 0 6px #000;
    }

    #backBtn {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 101;
        padding: 8px 14px;
        border-radius: 6px;
        border: 1px solid #555;
        background: rgba(30, 30, 30, 0.85);
        color: #ccc;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    #backBtn:hover {
        background: rgba(60, 60, 60, 0.95);
        color: #fff;
        border-color: #888;
    }

    #speedBtn {
        position: fixed;
        bottom: 28px;
        left: 28px;
        z-index: 102;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2px solid rgba(255,255,255,0.3);
        background: rgba(20, 20, 30, 0.8);
        color: #0ff;
        cursor: pointer;
        font-size: 15px;
        font-weight: bold;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        text-shadow: 0 0 6px #0ff;
    }

    #speedBtn:hover {
        background: rgba(40, 40, 60, 0.95);
        border-color: #0ff;
    }

    #upgradeOrb {
        position: fixed;
        right: 28px;
        bottom: 28px;
        width: 78px;
        height: 78px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #ff8aff 0%, #ff00ff 48%, #4a0048 100%);
        box-shadow: 0 0 42px #ff00ffaa;
        z-index: 102;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        animation: orbPulse 2s ease-in-out infinite;
    }

    #upgradeOrb:hover {
        transform: scale(1.12);
        box-shadow: 0 0 70px #ff00ff;
        animation: none;
    }

    #prestigeOrb {
        position: fixed;
        left: 28px;
        bottom: 90px;
        width: 58px;
        height: 58px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #8af 0%, #0af 48%, #004a6a 100%);
        box-shadow: 0 0 32px rgba(0,170,255,0.6);
        z-index: 102;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.3s;
        animation: prestigePulse 2.5s ease-in-out infinite;
        display: none;
    }

    #prestigeOrb:hover {
        transform: scale(1.12);
        box-shadow: 0 0 60px #0af;
        animation: none;
    }

    @keyframes prestigePulse {
        0%, 100% { box-shadow: 0 0 24px rgba(0,170,255,0.5); }
        50%      { box-shadow: 0 0 44px rgba(0,170,255,0.8); }
    }

    #prestigeStarCount {
        position: absolute;
        top: -8px;
        right: -8px;
        background: #0af;
        color: #000;
        border-radius: 50%;
        width: 22px;
        height: 22px;
        font-size: 12px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 8px #0af;
    }

    #prestigeGlass {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 200;
        background: rgba(0, 5, 16, 0.82);
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    #prestigeGlass.open {
        opacity: 1;
    }

    #prestigeTreeContainer {
        position: relative;
        width: 500px;
        height: 400px;
        margin: 0 auto;
    }

    #prestigeLineCanvas {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
    }

    .prestigeNode {
        position: absolute;
        z-index: 10;
        width: 118px;
        padding: 10px 8px 12px;
        border-radius: 12px;
        text-align: center;
        background: rgba(0, 20, 40, 0.65);
        border: 1px solid rgba(0, 170, 255, 0.3);
        backdrop-filter: blur(4px);
        pointer-events: auto;
        cursor: pointer;
        transform: var(--base-transform, none);
        transition: transform 0.2s, box-shadow 0.2s, filter 0.2s, border-color 0.2s, background 0.2s;
    }

    .prestigeNode:hover {
        transform: var(--base-transform, none) scale(1.1);
        box-shadow: 0 0 30px rgba(0,170,255,0.5);
        border-color: rgba(0, 170, 255, 0.7);
        background: rgba(0, 40, 80, 0.75);
    }

    .prestigeNode:active {
        transform: var(--base-transform, none) scale(0.97);
    }

    .prestigeNode .progressBar div {
        background: linear-gradient(90deg, #0af, #4df);
        box-shadow: 0 0 6px rgba(0,170,255,0.5);
    }

    .prestigeNode .uCost {
        color: #88ddff;
    }

    .prestigeNode .uReq {
        color: #6699bb;
    }

    #pOrbit   { top: 10px;  left: 50%;  --base-transform: translateX(-50%); }
    #pSpeed   { top: 175px; left: 25%;  --base-transform: translateX(-50%); }
    #pRadius  { top: 175px; left: 75%;  --base-transform: translateX(-50%); }

    .prestigeTitle {
        color: #0af;
        font-size: 22px;
        text-align: center;
        margin-bottom: 10px;
        letter-spacing: 2px;
        text-shadow: 0 0 10px #0af;
    }

    #closePrestige {
        position: fixed;
        top: 16px;
        right: 20px;
        z-index: 250;
        color: #0af;
        font-size: 42px;
        line-height: 1;
        cursor: pointer;
        user-select: none;
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: rgba(0, 20, 50, 0.6);
        border: 1px solid rgba(0, 170, 255, 0.4);
        transition: transform 0.2s ease, background 0.2s, box-shadow 0.2s;
    }

    #closePrestige:hover {
        transform: scale(1.15);
        background: rgba(0, 40, 100, 0.8);
        box-shadow: 0 0 20px rgba(0,170,255,0.4);
    }

    @keyframes orbPulse {
        0%, 100% { box-shadow: 0 0 32px #ff00ffaa; }
        50%      { box-shadow: 0 0 52px #ff00ffdd; }
    }

    #upgradeGlass {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 200;
        background: rgba(10, 0, 16, 0.78);
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    #upgradeGlass.open {
        opacity: 1;
    }

    #treeViewport {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 0;
        border: none;
        background: transparent;
        overflow: hidden;
        cursor: grab;
    }

    #treeContent {
        position: absolute;
        inset: 0;
        transform: translate(0px, 0px) scale(1);
        transform-origin: 0 0;
        pointer-events: auto;
    }

    #upgradeStarContainer {
        position: relative;
        width: 900px;
        height: 760px;
        margin: 0 auto;
    }

    #lineCanvas {
        position: absolute;
        inset: 0;
        z-index: 1;
        pointer-events: none;
    }

    .upgradeNode {
        position: absolute;
        z-index: 10;
        width: 118px;
        padding: 10px 8px 12px;
        border-radius: 12px;
        text-align: center;
        background: rgba(30, 5, 40, 0.65);
        border: 1px solid rgba(255, 0, 255, 0.3);
        backdrop-filter: blur(4px);
        pointer-events: auto;
        cursor: pointer;
        transform: var(--base-transform, none);
        transition: transform 0.2s, box-shadow 0.2s, filter 0.2s, border-color 0.2s, background 0.2s;
    }

    .upgradeNode:hover {
        transform: var(--base-transform, none) scale(1.1);
        box-shadow: 0 0 30px #ff00ff88;
        border-color: rgba(255, 0, 255, 0.7);
        background: rgba(60, 10, 80, 0.75);
    }

    .upgradeNode:active {
        transform: var(--base-transform, none) scale(0.97);
    }

    .upgradeNode.unlocked {
        animation: unlockPop 0.4s ease;
    }

    .iconCanvas {
        display: block;
        margin: 0 auto;
    }

    .uName {
        color: #fff;
        font-size: 18px;
        margin-top: 8px;
        letter-spacing: 1px;
    }

    .progressBar {
        width: 80%;
        height: 8px;
        margin: 12px auto;
        background: rgba(255, 255, 255, 0.25);
        border-radius: 4px;
        overflow: hidden;
    }

    .progressBar div {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ff00ff, #cc44ff);
        border-radius: 4px;
        transition: width 0.3s ease;
        box-shadow: 0 0 6px #ff00ff88;
    }

    .uCost {
        color: #ff88ff;
        font-size: 11px;
        margin-top: 2px;
        opacity: 0.8;
    }

    .uReq {
        color: #aa66aa;
        font-size: 10px;
        margin-top: 1px;
        opacity: 0.6;
    }

    .hpBar {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        display: flex;
        gap: 6px;
        pointer-events: none;
    }

    .hpHeart {
        font-size: 24px;
        filter: drop-shadow(0 0 4px #ff0044);
        transition: opacity 0.3s;
    }

    .hpHeart.empty {
        opacity: 0.2;
        filter: grayscale(1);
    }

    .waveBar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 4px;
        z-index: 99;
        background: rgba(255,255,255,0.1);
        pointer-events: none;
    }

    .waveBar div {
        height: 100%;
        background: linear-gradient(90deg, #ff00ff, #ff8800);
        transition: width 0.3s;
        box-shadow: 0 0 8px #ff00ff;
    }

    .damageOverlay {
        position: fixed;
        inset: 0;
        z-index: 98;
        pointer-events: none;
        background: radial-gradient(ellipse at center, transparent 50%, rgba(255,0,0,0.4) 100%);
        opacity: 0;
        transition: opacity 0.15s;
    }

    #closeGlass {
        position: fixed;
        top: 16px;
        right: 20px;
        z-index: 250;
        color: #ff00ff;
        font-size: 42px;
        line-height: 1;
        cursor: pointer;
        user-select: none;
        width: 48px;
        height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: rgba(40, 0, 50, 0.6);
        border: 1px solid rgba(255, 0, 255, 0.4);
        transition: transform 0.2s ease, background 0.2s, box-shadow 0.2s;
    }

    #closeGlass:hover {
        transform: scale(1.15);
        background: rgba(80, 0, 100, 0.8);
        box-shadow: 0 0 20px #ff00ff66;
    }

    #upDamage  { top: 10px;  left: 50%;  --base-transform: translateX(-50%); }
    #upLaser   { top: 155px; left: 17%;  --base-transform: translateX(-50%); }
    #upShield  { top: 155px; left: 50%;  --base-transform: translateX(-50%); }
    #upMagnet  { top: 155px; left: 83%;  --base-transform: translateX(-50%); }
    #upPierce  { top: 300px; left: 17%;  --base-transform: translateX(-50%); }
    #upDash    { top: 300px; left: 50%;  --base-transform: translateX(-50%); }
    #upDual    { top: 300px; left: 83%;  --base-transform: translateX(-50%); }
    #upGravity { top: 445px; left: 12%;  --base-transform: translateX(-50%); }
    #upCryo    { top: 445px; left: 37%;  --base-transform: translateX(-50%); }
    #upNova    { top: 445px; left: 63%;  --base-transform: translateX(-50%); }
    #upMulti   { top: 445px; left: 88%;  --base-transform: translateX(-50%); }
    #upRegen   { top: 590px; left: 50%;  --base-transform: translateX(-50%); }

    @media (max-width: 800px) {
        #closeGlass, #closePrestige {
            width: 56px;
            height: 56px;
            font-size: 48px;
        }

        #upgradeOrb {
            width: 86px;
            height: 86px;
        }

        #speedBtn {
            width: 52px;
            height: 52px;
            font-size: 16px;
        }

        #backBtn {
            padding: 12px 18px;
            font-size: 16px;
        }

        .diffBtn {
            width: 85vw;
            max-width: 400px;
            padding: 22px 0;
            font-size: 26px;
        }

        .diffDesc {
            font-size: 14px;
        }
    }

    @keyframes unlockPop {
        0%   { transform: var(--base-transform, none) scale(0.5); filter: brightness(2); }
        60%  { transform: var(--base-transform, none) scale(1.2); }
        100% { transform: var(--base-transform, none) scale(1); }
    }

    @keyframes orbDeathPulse {
        0%   { transform: scale(1); box-shadow: 0 0 60px #ff00ff; }
        100% { transform: scale(1.4); box-shadow: 0 0 140px #ff00ff; }
    }

    #difficultyMenu {
        position: fixed;
        inset: 0;
        z-index: 300;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.92);
        gap: 24px;
    }

    #difficultyMenu h1 {
        color: #fff;
        font-size: 52px;
        letter-spacing: 5px;
        margin-bottom: 36px;
        text-shadow: 0 0 30px #ff00ff;
    }

    .diffBtn {
        width: 380px;
        padding: 24px 0;
        border-radius: 16px;
        border: 2px solid rgba(255,255,255,0.15);
        background: rgba(20, 10, 30, 0.85);
        color: #fff;
        font-size: 28px;
        font-weight: bold;
        letter-spacing: 3px;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s, background 0.2s;
        text-shadow: 0 0 8px currentColor;
    }

    .diffBtn:hover {
        transform: scale(1.08);
    }

    .diffBtn.bethan {
        color: #88ffaa;
        border-color: rgba(136,255,170,0.4);
    }
    .diffBtn.bethan:hover {
        box-shadow: 0 0 30px rgba(136,255,170,0.5);
        background: rgba(20, 60, 30, 0.85);
    }

    .diffBtn.normal {
        color: #ff00ff;
        border-color: rgba(255,0,255,0.4);
    }
    .diffBtn.normal:hover {
        box-shadow: 0 0 30px rgba(255,0,255,0.5);
        background: rgba(60, 10, 60, 0.85);
    }

    .diffBtn.curtis {
        color: #ff2222;
        border-color: rgba(255,34,34,0.4);
    }
    .diffBtn.curtis:hover {
        box-shadow: 0 0 30px rgba(255,34,34,0.5);
        background: rgba(60, 10, 10, 0.85);
    }

    .diffDesc {
        font-size: 14px;
        opacity: 0.6;
        font-weight: normal;
        margin-top: 6px;
        letter-spacing: 0;
    }
</style>
</head>
<body>


<div id="difficultyMenu">
    <h1>Choose Person</h1>
    <button class="diffBtn bethan" onclick="chooseDifficulty('bethan')">
        Bethan
        <div class="diffDesc">Chill vibes mhm very</div>
    </button>
    <button class="diffBtn normal" onclick="chooseDifficulty('normal')">
        Normal people (Lizzy)
        <div class="diffDesc">Balanced (Normal)</div>
    </button>
    <button class="diffBtn curtis" onclick="chooseDifficulty('curtis')">
        <span style="position:relative;display:inline-block;">
            <span style="position:absolute;top:-18px;left:-10px;font-size:16px;transform:rotate(-20deg);">😈</span>
            Curtis
            <span style="position:absolute;top:-18px;right:-10px;font-size:16px;transform:rotate(20deg) scaleX(-1);">😈</span>
        </span>
        <div class="diffDesc">Pain Mhm</div>
    </button>
</div>

<div class="info" id="info">Points: 0</div>
<div class="hpBar" id="hpBar"></div>
<div class="waveBar" id="waveBar"><div id="waveProgress"></div></div>
<div class="damageOverlay" id="damageOverlay"></div>
<div>
    <button id="backBtn">← Menu</button>
</div>
<button id="speedBtn" title="Game Speed">1x</button>

<canvas id="gameCanvas"></canvas>

<div id="upgradeOrb"></div>
<div id="prestigeOrb" style="display:none"><span id="prestigeStarCount">0</span></div>

<div id="upgradeGlass">
<div id="treeViewport">
    <div id="treeContent">
    <div id="upgradeStarContainer">

        <div class="upgradeNode" id="upDamage">
            <canvas class="iconCanvas" width="60" height="60"></canvas>
            <div class="uName">Damage</div>
            <div class="progressBar"><div></div></div>
        </div>

        <div class="upgradeNode inner" id="upLaser">
            <canvas class="iconCanvas" width="60" height="60"></canvas>
            <div class="uName">Laser</div>
            <div class="progressBar"><div></div></div>
        </div>
        <div class="upgradeNode inner" id="upShield">
            <canvas class="iconCanvas" width="60" height="60"></canvas>
            <div class="uName">Shield</div>
            <div class="progressBar"><div></div></div>
        </div>
        <div class="upgradeNode inner" id="upMagnet">
            <canvas class="iconCanvas" width="60" height="60"></canvas>
            <div class="uName">Magnet</div>
            <div class="progressBar"><div></div></div>
        </div>

        <div class="upgradeNode inner" id="upPierce">
            <canvas class="iconCanvas" width="60" height="60"></canvas>
            <div class="uName">Pierce</div>
            <div class="progressBar"><div></div></div>
        </div>
        <div class="upgradeNode inner" id="upDash">
            <canvas class="iconCanvas" width="60" height="60"></canvas>
            <div class="uName">Dash</div>
            <div class="progressBar"><div></div></div>
        </div>
        <div class="upgradeNode inner" id="upDual">
            <canvas class="iconCanvas" width="60" height="60"></canvas>
            <div class="uName">Dual</div>
            <div class="progressBar"><div></div></div>
        </div>

        <div class="upgradeNode inner" id="upGravity">
            <canvas class="iconCanvas" width="60" height="60"></canvas>
            <div class="uName">Gravity</div>
            <div class="progressBar"><div></div></div>
        </div>
        <div class="upgradeNode inner" id="upCryo">
            <canvas class="iconCanvas" width="60" height="60"></canvas>
            <div class="uName">Cryo</div>
            <div class="progressBar"><div></div></div>
        </div>
        <div class="upgradeNode inner" id="upNova">
            <canvas class="iconCanvas" width="60" height="60"></canvas>
            <div class="uName">Nova</div>
            <div class="progressBar"><div></div></div>
        </div>
        <div class="upgradeNode inner" id="upMulti">
            <canvas class="iconCanvas" width="60" height="60"></canvas>
            <div class="uName">Multi</div>
            <div class="progressBar"><div></div></div>
        </div>

        <div class="upgradeNode inner" id="upRegen">
            <canvas class="iconCanvas" width="60" height="60"></canvas>
            <div class="uName">Regen</div>
            <div class="progressBar"><div></div></div>
        </div>

        <canvas id="lineCanvas" width="900" height="760"></canvas>

        </div>
        </div>
    </div>
    <div id="closeGlass">×</div>
</div>

<div id="prestigeGlass">
    <div style="position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <div class="prestigeTitle">★ Orbit Prestige ★</div>
        <div id="prestigeTreeContainer">
            <div class="prestigeNode" id="pOrbit">
                <canvas class="iconCanvas" width="60" height="60"></canvas>
                <div class="uName">Orbit</div>
                <div class="progressBar"><div></div></div>
            </div>
            <div class="prestigeNode" id="pSpeed">
                <canvas class="iconCanvas" width="60" height="60"></canvas>
                <div class="uName">Speed</div>
                <div class="progressBar"><div></div></div>
            </div>
            <div class="prestigeNode" id="pRadius">
                <canvas class="iconCanvas" width="60" height="60"></canvas>
                <div class="uName">Radius</div>
                <div class="progressBar"><div></div></div>
            </div>
            <canvas id="prestigeLineCanvas" width="500" height="400"></canvas>
        </div>
    </div>
    <div id="closePrestige">×</div>
</div>
<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let center = { x: canvas.width / 2, y: canvas.height / 2 };

window.addEventListener("resize", () => {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
    center = { x: canvas.width / 2, y: canvas.height / 2 };
});

let points = 0;
let gameOver = false;
let isPaused = false;

let particles = [];
let enemies = [];
let orbitBalls = [];
let spawnCount = 0;
let targetAngle = 0;
let difficultyRamp = 0;
let gameSpeed = 1;
let player2 = null;

let wave = 1;
let inBossFight = false;
let enemiesKilledThisWave = 0;
let enemiesToNextBoss = 30;

let bossLevel = 0;

let playerHP = 3;
let maxHP = 3;
let damageFlash = 0;

let pierceLevel = 0;
let cryoLevel = 0;
let cryoRadius = 0;
let cryoSlow = 1;
let gravityLevel = 0;
let multiLevel = 0;
let novaLevel = 0;
let novaCooldown = 0;
let novaMaxCooldown = 8000;
let novaRadius = 150;
let novaDamage = 1;
let novaFlash = 0;
let regenLevel = 0;
let regenTimer = 0;
let regenInterval = 15000;

let lastFrameTime = 0;

let offsetX = 0;
let offsetY = 0;
let isDraggingTree = false;
let lastX = 0;
let lastY = 0;
let scale = 1;
let dragMoved = false;


const viewport = document.getElementById("treeViewport");
const content = document.getElementById("treeContent");


const infoDiv = document.getElementById("info");

document.getElementById("backBtn").onclick = () => {
    window.location.href = "index.html";
};

viewport.addEventListener("mousedown", (e) => {
    if (e.target.closest(".upgradeNode")) return;

    isDraggingTree = true;
    dragMoved = false;

    lastX = e.clientX;
    lastY = e.clientY;
});

window.addEventListener("mousemove", (e) => {
    if (!isDraggingTree) return;

    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;

    if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
        dragMoved = true;
    }

    offsetX += dx;
    offsetY += dy;

    lastX = e.clientX;
    lastY = e.clientY;

    updateTreeTransform();
});

window.addEventListener("mouseup", () => {
    isDraggingTree = false;
});

function updateTreeTransform() {
    content.style.transform =
        `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;

    drawConnectionLines(); // keep lines aligned
}

viewport.addEventListener("wheel", (e) => {
    e.preventDefault();

    const zoomSpeed = 0.1;
    scale += e.deltaY < 0 ? zoomSpeed : -zoomSpeed;

    scale = Math.max(0.5, Math.min(2, scale));

    updateTreeTransform();
});

let shakeTime = 0; // now in seconds
function screenShake(dt) {
    if (shakeTime > 0) {
        const dx = (Math.random() - 0.5) * 10;
        const dy = (Math.random() - 0.5) * 10;
        ctx.translate(dx, dy);
        shakeTime -= dt / 60;
        if (shakeTime < 0) shakeTime = 0;
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 5;
        this.vy = (Math.random() - 0.5) * 5;
        this.life = 0.5; // seconds
        this.color = color;
    }
    update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.life -= dt / 60;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, 3, 3);
    }
}

class PlayerBall {
    constructor() {
        this.orbitRadius = 150;
        this.angle = 0;
        this.size = 16;
        this.blink = 0;
    }
    update(mx, my) {
        if (mx !== null) {
            this.angle = Math.atan2(my - center.y, mx - center.x);
        }
        this.x = center.x + Math.cos(this.angle) * this.orbitRadius;
        this.y = center.y + Math.sin(this.angle) * this.orbitRadius;
    }
    draw() {
        ctx.save();

        if (this.blink === 1) ctx.globalAlpha = 0.2;
        else if (this.blink === 2) ctx.globalAlpha = 0.4;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();

        ctx.restore();
    }
}

class OrbitBall {
    constructor(angle) {
        this.angle = angle;
        this.orbitRadius = 60;
        this.size = 14;
        this.angularSpeed = 0.02;
        this.damage = 0.25;
    }

    update(centerAngle, i, total, dt) {
        // Base orbit
        const spreadOffset = player2 ? Math.PI / total : 0;
        const baseTarget = centerAngle + spreadOffset + i * (Math.PI * 2 / total);
        this.angle += ((baseTarget - this.angle) * 0.1 + this.angularSpeed) * dt;

        // Subtle wobble
        this.angle += Math.sin(Date.now() * 0.002 + i) * 0.01 * dt;

        // Soft magnet attraction
        if (window.magnetLevel > 0 && enemies.length > 0) {
            let nearest = null;
            let nd = Infinity;
            enemies.forEach(e => {
                const d = Math.hypot(e.x - this.x, e.y - this.y);
                if (d < nd) { nd = d; nearest = e; }
            });

            if (nearest) {
                const desired = Math.atan2(nearest.y - this.y, nearest.x - this.x);
                let diff = desired - this.angle;
                diff = Math.atan2(Math.sin(diff), Math.cos(diff));
                this.angle += diff * window.magnetStrength * dt;
            }
        }

        // Final position
        this.x = center.x + Math.cos(this.angle) * this.orbitRadius;
        this.y = center.y + Math.sin(this.angle) * this.orbitRadius;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = "#0ff";
        ctx.fill();
    }
}

const enemyTypes = {
    fast:     { color: "#ff0000", size: 8,  gravity: 0.20, life: 1, speedMultiplier: 1.8, pts: 1 },
    medium:   { color: "#ff8800", size: 14, gravity: 0.10, life: 2, speedMultiplier: 0.8, pts: 1 },
    slow:     { color: "#8800ff", size: 20, gravity: 0.05, life: 6, speedMultiplier: 0.4, pts: 2 },
    zigzag:   { color: "#00ff88", size: 10, gravity: 0.12, life: 2, speedMultiplier: 1.2, pts: 2, zigzags: true },
    shielded: { color: "#ffff00", size: 16, gravity: 0.08, life: 3, speedMultiplier: 0.6, pts: 3, hasShield: true },
    splitter: { color: "#ff4488", size: 18, gravity: 0.07, life: 2, speedMultiplier: 0.7, pts: 2, splits: true },
    ghost:    { color: "#8888ff", size: 12, gravity: 0.10, life: 1, speedMultiplier: 1.0, pts: 3, phases: true }
};

class Enemy {
    constructor(forceType = null) {
        spawnCount++;

        // Choose type based on wave
        let t;
        if (forceType) t = forceType;
        else if (spawnCount < 5) t = enemyTypes.medium;
        else if (spawnCount < 15) t = Math.random() < 0.7 ? enemyTypes.medium : enemyTypes.slow;
        else {
            // Build pool based on wave
            let pool = [
                { type: enemyTypes.medium, w: 35 },
                { type: enemyTypes.slow,   w: 20 },
                { type: enemyTypes.fast,   w: 15 }
            ];
            if (wave >= 3) pool.push({ type: enemyTypes.zigzag,   w: 12 });
            if (wave >= 4) pool.push({ type: enemyTypes.shielded, w: 8 });
            if (wave >= 5) pool.push({ type: enemyTypes.splitter, w: 8 });
            if (wave >= 6) pool.push({ type: enemyTypes.ghost,    w: 7 });

            const totalW = pool.reduce((s, p) => s + p.w, 0);
            let r = Math.random() * totalW;
            t = pool[pool.length - 1].type;
            for (const p of pool) {
                r -= p.w;
                if (r <= 0) { t = p.type; break; }
            }
        }

        Object.assign(this, JSON.parse(JSON.stringify(t)));

        // Scale health with difficulty
        const healthScale = 1.2 + (difficultyRamp * 0.8);
        this.life = Math.ceil(this.life * healthScale);

        // Wave scaling: enemies get tougher
        if (wave > 5) {
            this.life += Math.floor((wave - 5) * 0.3);
            this.speedMultiplier *= 1 + (wave - 5) * 0.02;
        }

        // Type-specific init
        if (this.zigzags) this.zigTimer = Math.random() * Math.PI * 2;
        if (this.phases) {
            this.phaseTimer = Math.random() * Math.PI * 2;
            this.visible = true;
        }
        if (this.hasShield) this.shielded = true;

        // Spawn at edge
        const e = Math.random();
        if (e < 0.25)  { this.x = 0;            this.y = Math.random() * canvas.height; }
        else if (e<.5) { this.x = canvas.width; this.y = Math.random() * canvas.height; }
        else if (e<.75){ this.x = Math.random() * canvas.width; this.y = 0; }
        else           { this.x = Math.random() * canvas.width; this.y = canvas.height; }

        this.vx = 0;
        this.vy = 0;
    }

    takeDamage(dmg) {
        if (this.phases && !this.visible) return false;
        if (this.shielded) {
            this.shielded = false;
            this.color = this.color === "#ffff00" ? "#cc8800" : this.color;
            for (let i = 0; i < 8; i++)
                particles.push(new Particle(this.x, this.y, "#ffff00"));
            return false;
        }
        this.life -= dmg;
        return true;
    }

    update(dt) {
        const dx = center.x - this.x;
        const dy = center.y - this.y;
        const dist = Math.hypot(dx, dy);

        const speedScale = (0.35 + (difficultyRamp * 0.4)) * diffSpeedMul;

        this.vx += dx / dist * this.gravity * this.speedMultiplier * speedScale * dt;
        this.vy += dy / dist * this.gravity * this.speedMultiplier * speedScale * dt;

        // Zigzag oscillation
        if (this.zigzags) {
            this.zigTimer += 0.08 * dt;
            const perpX = -dy / dist;
            const perpY = dx / dist;
            this.vx += perpX * Math.sin(this.zigTimer) * 0.8 * dt;
            this.vy += perpY * Math.sin(this.zigTimer) * 0.8 * dt;
        }

        // Ghost phasing
        if (this.phases) {
            this.phaseTimer += 0.025 * dt;
            this.visible = Math.sin(this.phaseTimer) > -0.3;
        }

        // Cryo slowdown — affects enemies in area except bosses and purple
        if (cryoLevel > 0 && !this.isBoss && this.color !== "#8800ff") {
            const cd = Math.hypot(this.x - center.x, this.y - center.y);
            if (cd < cryoRadius) {
                const slow = Math.pow(cryoSlow, dt);
                this.vx *= slow;
                this.vy *= slow;
            }
        }

        // Clamp to max speed
        const spd = Math.hypot(this.vx, this.vy);
        if (spd > ENEMY_MAX_SPEED) {
            this.vx *= ENEMY_MAX_SPEED / spd;
            this.vy *= ENEMY_MAX_SPEED / spd;
        }

        this.x += this.vx * dt;
        this.y += this.vy * dt;
    }

    draw() {
        ctx.save();
        if (this.phases && !this.visible) ctx.globalAlpha = 0.15;

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();

        if (this.shielded) {
            ctx.strokeStyle = "rgba(255,255,0,0.5)";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size + 5, 0, Math.PI * 2);
            ctx.stroke();
        }
        ctx.restore();
    }
}

class BossEnemy {
    constructor(x = null, y = null, size = 40, generation = 0) {
        this.size = size;
        this.generation = generation; // how many times it has split
        this.maxGeneration = 2;

        this.life = 1; // dies in one hit → triggers split
        this.color = "#ff00ff";

        this.x = x ?? Math.random() * canvas.width;
        this.y = y ?? -50;

        this.vx = 0;
        this.vy = 1;

        this.blink = 0;
        this.isBoss = true; // IMPORTANT FLAG
    }

    update(dt) {
        const dx = center.x - this.x;
        const dy = center.y - this.y;
        const dist = Math.hypot(dx, dy);

        const speed = 0.06 + this.generation * 0.02;

        this.vx += dx / dist * speed * dt;
        this.vy += dy / dist * speed * dt;

        this.x += this.vx * dt;
        this.y += this.vy * dt;
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

let enemyInterval = null;

function rebuildFromUpgrades() {
    orbitBalls = [];
    player = new PlayerBall();

    const orbitLevel  = prestigeUpgrades.find(u => u.name === "Orbit").level;
    const radiusLevel = prestigeUpgrades.find(u => u.name === "Radius").level;
    const speedLevel  = prestigeUpgrades.find(u => u.name === "Speed").level;
    const dualLevel   = upgrades.find(u => u.name === "Dual").level;

    const dUp = upgrades.find(u => u.name === "Damage").level;
    damageBonus = dUp;

    for (let i = 0; i < 1 + orbitLevel; i++) {
        const o = new OrbitBall(Math.random() * Math.PI * 2);
        o.angularSpeed += speedLevel * 0.015;
        o.damage = 0.25 + damageBonus * 0.25 + speedLevel * 0.125;
        orbitBalls.push(o);
    }

    player.orbitRadius = 150 + radiusLevel * 25;

    if (dualLevel > 0) player2 = new PlayerBall();
    else player2 = null;

    const laserLevel = upgrades.find(u => u.name === "Laser").level;
    laserDamage = 0.25 + laserLevel * 0.25;
    laserFireDelay = Math.max(2000, 5000 - laserLevel * 400);

    const shieldUp = upgrades.find(u => u.name === "Shield").level;
    shieldLevel = shieldUp;
    shieldRadius = 60;
    shieldBounce = 4 + shieldUp * 1.5;
    shieldDamage = shieldUp * 0.5;
    shieldBounceCooldown = shieldUp > 0 ? (16 - shieldUp) * 1000 : 20000;
    shieldBounceTimer = 0;

    const magnetUp = upgrades.find(u => u.name === "Magnet").level;
    magnetLevel = magnetUp;
    magnetStrength = 0.04 + magnetUp * 0.02;

    const dashUp = upgrades.find(u => u.name === "Dash").level;
    dashLevel = dashUp;
    dashCooldown = Math.max(800, 2500 - dashUp * 300);
    dashInvulTime = 300 + dashUp * 80;

    // New upgrades
    const pUp = upgrades.find(u => u.name === "Pierce").level;
    pierceLevel = pUp;

    const cUp = upgrades.find(u => u.name === "Cryo").level;
    cryoLevel = cUp;
    cryoRadius = cUp > 0 ? 60 + cUp * 60 : 0;
    cryoSlow = cUp > 0 ? 0.99 - cUp * 0.005 : 1;

    const gUp = upgrades.find(u => u.name === "Gravity").level;
    gravityLevel = gUp;

    const mUp = upgrades.find(u => u.name === "Multi").level;
    multiLevel = mUp;

    const nUp = upgrades.find(u => u.name === "Nova").level;
    novaLevel = nUp;
    novaMaxCooldown = nUp > 0 ? Math.max(3000, 8000 - nUp * 1500) : 8000;
    novaRadius = 150 + nUp * 40;
    novaDamage = 1 + nUp * 0.5;
    novaCooldown = 0;

    const rUp = upgrades.find(u => u.name === "Regen").level;
    regenLevel = rUp;
    regenInterval = rUp > 0 ? Math.max(6000, 15000 - rUp * 3000) : 15000;
    regenTimer = 0;
}

function startEnemySpawn() {
    clearInterval(enemyInterval);

    function spawnLoop() {

        const maxEnemies = 6 + wave * 3;

        if (!gameOver && !isPaused && enemies.length < maxEnemies){

            // Fast enemy warning burst
            if (spawnCount > 15 && Math.random() < 0.15) {

                const edge = Math.random();

                for (let i = 0; i < 50; i++) {
                    let x, y;
                    if (edge < 0.25)   { x = 0; y = Math.random() * canvas.height; }
                    else if (edge<.5)  { x = canvas.width; y = Math.random() * canvas.height; }
                    else if (edge<.75) { x = Math.random() * canvas.width; y = 0; }
                    else               { x = Math.random() * canvas.width; y = canvas.height; }

                    particles.push(new Particle(x, y, "#ff2222"));
                }

                setTimeout(() => {
                    enemies.push(new Enemy(enemyTypes.fast));
                }, 500);

            } else {
                enemies.push(new Enemy());
            }
            
        }

        
        const delay = Math.max(300, 1500 - wave * 70) * diffSpawnMul / gameSpeed;

        enemyInterval = setTimeout(spawnLoop, delay);
    }

    spawnLoop();
}

// Web Sound Controls :)
let audioCtx = null;
let masterGain = null;
let audioStarted = false;
let reverbNode = null;

// Chord definitions (kept for future use)
const chordBank = [
    { name: "Eb13",    semitones: [0, 4, 7, 10, 14, 21] },
    { name: "Bbadd9",  semitones: [0, 4, 7, 14] },
    { name: "Fm7",     semitones: [0, 3, 7, 10] },
    { name: "Abadd9",  semitones: [0, 4, 7, 14] }
];
const chordRoots = [155.56, 233.08, 174.61, 207.65];

// Build a simple impulse-response buffer for convolution reverb
function createReverbBuffer(ctx, duration, decay) {
    const rate = ctx.sampleRate;
    const len = rate * duration;
    const buf = ctx.createBuffer(2, len, rate);
    for (let ch = 0; ch < 2; ch++) {
        const data = buf.getChannelData(ch);
        for (let i = 0; i < len; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
        }
    }
    return buf;
}

function initAudio() {
    if (audioStarted) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.35;

    // Reverb send
    reverbNode = audioCtx.createConvolver();
    reverbNode.buffer = createReverbBuffer(audioCtx, 2.2, 2.8);
    const reverbGain = audioCtx.createGain();
    reverbGain.gain.value = 0.45;  // wet mix
    reverbNode.connect(reverbGain);
    reverbGain.connect(audioCtx.destination);

    masterGain.connect(audioCtx.destination); // dry
    masterGain.connect(reverbNode);           // send to reverb

    audioStarted = true;
}

// Add as many chords as you like — speed bands are auto-generated.
const ENEMY_MAX_SPEED = 20;

const collisionChordDict = [
    { name: "C#maj13", root: 138.59, semitones: [0, 4, 7, 11, 14, 21] },
    { name: "G#add9",  root: 207.65, semitones: [0, 4, 7, 14] },
    { name: "D#m7",    root: 155.56, semitones: [0, 3, 7, 10] },
    { name: "F#add9",  root: 184.99, semitones: [0, 4, 7, 14] }
];

function buildCollisionNotes() {
    const notes = [];
    for (const ch of collisionChordDict) {
        for (const st of ch.semitones) {
            notes.push(ch.root * Math.pow(2, st / 12));
        }
    }
    return notes;
}
const collisionNotes = buildCollisionNotes();

function buildSpeedBands(noteCount) {
    const bands = [];
    for (let i = 0; i < noteCount; i++) {
        bands.push((i / noteCount) * ENEMY_MAX_SPEED);
    }
    return bands;
}
const ENEMY_SPEED_BANDS = buildSpeedBands(collisionNotes.length);

function speedToNoteIndex(speed) {
    let idx = 0;
    for (let i = ENEMY_SPEED_BANDS.length - 1; i >= 0; i--) {
        if (speed >= ENEMY_SPEED_BANDS[i]) { idx = i; break; }
    }
    return idx;
}

// Play a sine ping with soft attack + reverb tail on collision
function playCollisionTone(speed) {
    if (!audioStarted || !audioCtx) return;
    const idx = speedToNoteIndex(Math.min(speed, ENEMY_MAX_SPEED));
    const freq = collisionNotes[idx];

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.value = freq;
    gain.gain.value = 0;
    osc.connect(gain);
    gain.connect(masterGain); // goes to both dry + reverb send

    const t = audioCtx.currentTime;
    // Soft attack (~40ms rise), gentle sustain, long decay into reverb tail
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.22, t + 0.04);    // 40ms soft attack
    gain.gain.setValueAtTime(0.22, t + 0.06);             // brief hold
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6); // 600ms fade into reverb
    osc.start(t);
    osc.stop(t + 0.65);
}

// Start audio on first user interaction
function ensureAudio() {
    if (!audioStarted) initAudio();
    else if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
}
window.addEventListener("click", ensureAudio, { once: false });
window.addEventListener("touchstart", ensureAudio, { once: false });

let activeLaserBeams = [];

function updateLaserSystem(deltaTime) {
    const lvl = upgrades.find(u => u.name === "Laser").level;
    if (lvl === 0) return;
    if (isPaused) return;

    laserCooldown -= deltaTime;
    if (laserCooldown > 0) return;

    const delay = laserFireDelay;
    const dmg   = laserDamage;

    // Multi: fire at multiple targets
    const targetCount = 1 + multiLevel;
    let targeted = new Set();

    for (let t = 0; t < targetCount; t++) {
        let nearest = null;
        let nd = Infinity;
        for (let e of enemies) {
            if (targeted.has(e)) continue;
            if (e.phases && !e.visible) continue;
            const d = Math.hypot(e.x - player.x, e.y - player.y);
            if (d < nd) { nd = d; nearest = e; }
        }
        if (!nearest) break;
        targeted.add(nearest);

        // Fire with pierce chain
        fireLaserChain(nearest, dmg);
    }

    if (targeted.size > 0) laserCooldown = delay;
}

function fireLaserChain(startEnemy, dmg) {
    let targets = [startEnemy];
    let hit = new Set([startEnemy]);

    for (let i = 0; i < pierceLevel; i++) {
        let last = targets[targets.length - 1];
        let nearest = null;
        let nd = Infinity;
        for (let e of enemies) {
            if (hit.has(e)) continue;
            if (e.phases && !e.visible) continue;
            const d = Math.hypot(e.x - last.x, e.y - last.y);
            if (d < nd && d < 200) { nd = d; nearest = e; }
        }
        if (!nearest) break;
        targets.push(nearest);
        hit.add(nearest);
    }

    for (let enemy of targets) {
        fireLaserAt(enemy, dmg);
    }

    // Draw chain lines between pierce targets
    for (let i = 1; i < targets.length; i++) {
        activeLaserBeams.push({
            x1: targets[i-1].x, y1: targets[i-1].y,
            x2: targets[i].x, y2: targets[i].y,
            alpha: 0.7
        });
    }
}

function fireLaserAt(enemy, dmg) {
    if (enemy.takeDamage) enemy.takeDamage(dmg);
    else enemy.life -= dmg;

    activeLaserBeams.push({
        x1: player.x, y1: player.y,
        x2: enemy.x, y2: enemy.y,
        alpha: 1
    });

    for (let i = 0; i < 12; i++)
        particles.push(new Particle(enemy.x, enemy.y, "#ff00ff"));
}

function drawLaserBeams(dt) {
    for (let beam of activeLaserBeams) {
        ctx.strokeStyle = `rgba(255,0,255,${beam.alpha})`;
        ctx.lineWidth = 3;

        ctx.beginPath();
        ctx.moveTo(beam.x1, beam.y1);
        ctx.lineTo(beam.x2, beam.y2);
        ctx.stroke();

        beam.alpha -= 0.08 * dt;
    }
    activeLaserBeams = activeLaserBeams.filter(b => b.alpha > 0);
}


function drawShield(dt) {
    if (shieldLevel === 0) return;

    shieldPulseTime += 0.05 * dt;
    const pulse = Math.sin(shieldPulseTime) * 6;
    const r = shieldRadius + pulse;

    const alpha = shieldBounceTimer > 0 ? 0.3 : 0.8;
    ctx.beginPath();
    ctx.arc(center.x, center.y, r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,0,255,${alpha})`;
    ctx.lineWidth = 3 + Math.sin(shieldPulseTime) * 1.5;
    ctx.shadowBlur = 25;
    ctx.shadowColor = "#ff00ff";
    ctx.stroke();
    ctx.shadowBlur = 0;
}

function drawCryoField() {
    if (cryoLevel === 0) return;
    ctx.beginPath();
    ctx.arc(center.x, center.y, cryoRadius, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(0,180,255,0.25)";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = "rgba(0,180,255,0.04)";
    ctx.fill();
}

function applyGravityWell(dt) {
    if (gravityLevel === 0) return;
    const pull = 0.002 * gravityLevel * dt;
    for (let i = 0; i < enemies.length; i++) {
        for (let j = i + 1; j < enemies.length; j++) {
            const a = enemies[i], b = enemies[j];
            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.hypot(dx, dy);
            if (dist < 250 && dist > 1) {
                const fx = dx / dist * pull;
                const fy = dy / dist * pull;
                a.vx += fx; a.vy += fy;
                b.vx -= fx; b.vy -= fy;
            }
        }
    }
}

function updateNova(delta) {
    if (novaLevel === 0) return;
    novaCooldown -= delta;
    if (novaCooldown > 0) return;
    novaCooldown = novaMaxCooldown;
    for (let e of enemies) {
        const d = Math.hypot(e.x - center.x, e.y - center.y);
        if (d < novaRadius) {
            e.life -= novaDamage;
            for (let i = 0; i < 5; i++)
                particles.push(new Particle(e.x, e.y, "#ff8800"));
        }
    }
    novaFlash = 1;
    shakeTime = 0.15;
    for (let i = 0; i < 30; i++)
        particles.push(new Particle(center.x, center.y, "#ffaa00"));
}

function drawNovaFlash(dt) {
    if (novaFlash <= 0) return;
    ctx.beginPath();
    ctx.arc(center.x, center.y, novaRadius * (1 - novaFlash * 0.3), 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,150,0,${novaFlash})`;
    ctx.lineWidth = 4;
    ctx.stroke();
    novaFlash -= 0.025 * dt;
}

function updateRegen(delta) {
    if (regenLevel === 0) return;
    if (playerHP >= maxHP) return;
    regenTimer -= delta;
    if (regenTimer > 0) return;
    playerHP++;
    regenTimer = regenInterval;
    updateHPDisplay();
    for (let i = 0; i < 12; i++)
        particles.push(new Particle(center.x, center.y, "#00ff88"));
}

function updateHPDisplay() {

    for (let i = 0; i < maxHP; i++) {

}

function updateWaveProgress() {
    const pct = Math.min(100, (enemiesKilledThisWave / enemiesToNextBoss) * 100);
    document.getElementById("waveProgress").style.width = pct + "%";
}

function updateShieldCollision(e) {
    if (shieldLevel === 0) return;
    if (shieldBounceTimer > 0) return;

    const dx = e.x - center.x;
    const dy = e.y - center.y;
    const dist = Math.hypot(dx, dy);

    if (dist < shieldRadius + e.size) {
        const nx = dx / dist;
        const ny = dy / dist;

        e.vx += nx * shieldBounce;
        e.vy += ny * shieldBounce;

        if (e.takeDamage) e.takeDamage(shieldDamage);
        else e.life -= shieldDamage;
        points++;

        playCollisionTone(Math.hypot(e.vx, e.vy));
        shieldBounceTimer = shieldBounceCooldown;

        for (let i = 0; i < 6; i++)
            particles.push(new Particle(e.x, e.y, "#ff00ff"));
    }
}

}


function tryDash() {
    if (isPaused) return;

    dashReady = false;

    for (let i = 0; i < 15; i++)
        particles.push(new Particle(player.x, player.y, "#ff00ff"));

    setTimeout(() => dashVulnerable = true, dashInvulTime);
    setTimeout(() => dashReady = true, dashCooldown);

function checkWaveProgression() {
    if (inBossFight) return;

    if (enemiesKilledThisWave >= enemiesToNextBoss) {
        startBossFight();
    }
}

function startBossFight() {
    inBossFight = true;
    bossLevel++;
    enemies = [];

    // Cycle through 5 boss types
    const bossType = ((bossLevel - 1) % 5) + 1;
    if (bossType === 1) enemies.push(new BossEnemy());
    else if (bossType === 2) enemies.push(new FastBoss());
    else if (bossType === 3) enemies.push(new TankBoss());
    else if (bossType === 4) enemies.push(new OrbiterBoss());
    else enemies.push(new PulseBoss());
}

class FastBoss extends BossEnemy {
    constructor() {
        super();
        this.size = 30;
        this.color = "#ff2222";
    }

    update(dt) {
        const dx = center.x - this.x;
        const dy = center.y - this.y;
        const dist = Math.hypot(dx, dy);

        this.vx += dx / dist * 0.15 * dt;
        this.vy += dy / dist * 0.15 * dt;

        this.x += this.vx * dt;
        this.y += this.vy * dt;
    }
}

class TankBoss extends BossEnemy {
    constructor() {
        super();
        this.size = 60;
        this.life = 10 + bossLevel * 3;
        this.color = "#8800ff";
    }
}

class OrbiterBoss extends BossEnemy {
    constructor() {
        super(canvas.width / 2 + 200, canvas.height / 2);
        this.size = 35;
        this.life = 12 + bossLevel * 2;
        this.color = "#00ffaa";
        this.isBoss = true;
        this.orbitAngle = 0;
        this.orbitSpeed = 0.015;
        this.orbitDist = 250;
        this.spawnTimer = 0;
        this.maxGeneration = 0;
    }
    update(dt) {
        this.orbitAngle += this.orbitSpeed * dt;
        this.x = center.x + Math.cos(this.orbitAngle) * this.orbitDist;
        this.y = center.y + Math.sin(this.orbitAngle) * this.orbitDist;
        this.vx = 0; this.vy = 0;
        this.spawnTimer += dt;
        if (this.spawnTimer > 180) {
            this.spawnTimer = 0;
            enemies.push(new Enemy(enemyTypes.fast));
        }
        if (this.life < 6) this.orbitSpeed = 0.025;
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 25;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.shadowBlur = 0;
        // Draw orbit path
        ctx.strokeStyle = "rgba(0,255,170,0.15)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(center.x, center.y, this.orbitDist, 0, Math.PI * 2);
        ctx.stroke();
    }
}

class PulseBoss extends BossEnemy {
    constructor() {
        super();
        this.size = 50;
        this.life = 18 + bossLevel * 3;
        this.color = "#ff8800";
        this.isBoss = true;
        this.pulseTimer = 0;
        this.pulseFlash = 0;
        this.maxGeneration = 0;
    }
    update(dt) {
        const dx = center.x - this.x;
        const dy = center.y - this.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 200) {
            this.vx += dx / dist * 0.04 * dt;
            this.vy += dy / dist * 0.04 * dt;
        } else {
            this.vx *= Math.pow(0.95, dt);
            this.vy *= Math.pow(0.95, dt);
        }
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.pulseTimer += dt;
        if (this.pulseTimer > 300) {
            this.pulseTimer = 0;
            this.pulseFlash = 1;
            // Push all orbit balls outward
            orbitBalls.forEach(o => {
                const pdx = o.x - this.x;
                const pdy = o.y - this.y;
                const pd = Math.hypot(pdx, pdy) || 1;
                o.angle += (pdx / pd) * 0.5;
            });
            shakeTime = 0.15;
            for (let i = 0; i < 20; i++)
                particles.push(new Particle(this.x, this.y, "#ff8800"));
        }
    }
    draw() {
        if (this.pulseFlash > 0) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 200 * (1 - this.pulseFlash), 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255,136,0,${this.pulseFlash})`;
            ctx.lineWidth = 3;
            ctx.stroke();
            this.pulseFlash -= 0.02;
        }
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

function endBossFight() {
    inBossFight = false;
    wave++;
    enemiesKilledThisWave = 0;
    enemiesToNextBoss += 12;

    difficultyRamp += 0.08;
    if (difficultyRamp > 1) difficultyRamp = 1;

        enemies.push(new Enemy());
    }
}

function canBuyUpgrade(u) {
    // Check requires against both upgrade pools
    return u.requires.every(req => {
        const up = upgrades.find(x => x.name === req.name) || prestigeUpgrades.find(x => x.name === req.name);
        return up && up.level >= req.level;
    });
}

function canBuyPrestigeUpgrade(u) {
    return u.requires.every(req => {
        const up = prestigeUpgrades.find(x => x.name === req.name);
        return up && up.level >= req.level;
    });
}

function getUpgradeCost(u) {

function drawConnectionLines() {
    const lineCanvas = document.getElementById("lineCanvas");
    const lctx = lineCanvas.getContext("2d");

    const star = document.getElementById("upgradeStarContainer");
    lineCanvas.width = Math.max(1, Math.floor(star.clientWidth));
    lineCanvas.height = Math.max(1, Math.floor(star.clientHeight));

    lctx.clearRect(0, 0, lineCanvas.width, lineCanvas.height);
    lctx.globalAlpha = 1;

    function centerOf(node) {
        return {
            x: node.offsetLeft + node.offsetWidth / 2,
            y: node.offsetTop  + node.offsetHeight / 2
        };
    }

    const pairs = [
        [upDamage,  upLaser],
        [upDamage,  upShield],
        [upDamage,  upMagnet],
        [upLaser,   upPierce],
        [upLaser,   upDual],
        [upShield,  upDash],
        [upMagnet,  upDash],
        [upMagnet,  upGravity],
        [upPierce,  upMulti],
        [upDual,    upMulti],
        [upDash,    upNova],
        [upShield,  upCryo],
        [upCryo,    upRegen],
        [upNova,    upRegen]
    ];

    pairs.forEach(([A, B]) => {
        // Skip lines to hidden nodes
        if (A.style.display === "none" || B.style.display === "none") return;

        const a = centerOf(A);
        const b = centerOf(B);

        const unlocked =
            upgrades.find(u => u.name === A.querySelector(".uName").textContent)?.level > 0 &&
            upgrades.find(u => u.name === B.querySelector(".uName").textContent)?.level > 0;

        const glow = unlocked ? "#ff00ff" : "#553355";

        lctx.strokeStyle = glow;
        lctx.lineWidth = 4;

        lctx.beginPath();
        lctx.moveTo(a.x, a.y);
        lctx.lineTo(b.x, b.y);
        lctx.stroke();
    });
}

function applyPrestigeUpgrade(name) {
    const u = prestigeUpgrades.find(x => x.name === name);
    if (!u) return;
    if (!canBuyPrestigeUpgrade(u)) return;
    const cost = u.cost + u.level;
    if (prestigeStars >= cost && u.level < u.max) {
        prestigeStars -= cost;
        document.getElementById("prestigeStarCount").textContent = prestigeStars;
        u.level++;

        if (name === "Orbit") {
            const speedLvl = prestigeUpgrades.find(x => x.name === "Speed").level;
            const o = new OrbitBall(Math.random() * Math.PI * 2);
            o.angularSpeed += speedLvl * 0.015;
            o.damage = 0.25 + damageBonus * 0.25 + speedLvl * 0.125;
            orbitBalls.push(o);
        }
        if (name === "Radius")
            player.orbitRadius += 25;
        if (name === "Speed") {
            orbitBalls.forEach(o => {
                o.angularSpeed += 0.015;
                o.damage = 0.25 + damageBonus * 0.25 + u.level * 0.125;
            });
        }

        const node = document.querySelector(`.prestigeNode[data-name="${name}"]`);
        if (node) {
            node.classList.add("unlocked");
            setTimeout(() => node.classList.remove("unlocked"), 400);

        drawPrestigeConnectionLines();
        updatePrestigeBars();
    }

function updatePrestigeBars() {

        const name = node.querySelector(".uName").textContent;

        if (!u) return;
        if (!canBuyPrestigeUpgrade(u)) {

        if (!costEl) {

            costEl.className = "uCost";
            node.querySelector(".progressBar").before(costEl);
        }
        if (u.level >= u.max) costEl.textContent = "MAX";
        else costEl.textContent = `Cost: ${u.cost + u.level} ★`;

        let reqEl = node.querySelector(".uReq");
        if (!reqEl) {
            reqEl = document.createElement("div");
            reqEl.className = "uReq";
            costEl.after(reqEl);
        }
        if (!canBuyPrestigeUpgrade(u) && u.requires.length > 0) {
            reqEl.textContent = "Needs: " + u.requires.map(r => `${r.name} Lv${r.level}`).join(", ");
        } else {
            reqEl.textContent = "";
        }
    });
}

function applyUpgrade(name) {
    const u = upgrades.find(x => x.name === name);
    if (!u) return;
    if (!canBuyUpgrade(u)) return;

    const cost = getUpgradeCost(u);
    if (points >= cost && u.level < u.max && canBuyUpgrade(u)) {
        points -= cost;
        infoDiv.textContent = `Wave ${wave} | Points: ${points}`;
        u.level++;

        if (name === "Damage") {
            damageBonus = u.level;
            orbitBalls.forEach(o => { o.damage = 0.25 + damageBonus * 0.25; });
        }

        if (name === "Laser") {
            laserDamage = 0.25 + u.level * 0.25;
            laserFireDelay = Math.max(2000, 5000 - u.level * 400);
        }

        if (name === "Shield") {
            shieldLevel++;
            shieldRadius += 0;
            shieldBounce += 1.5;
            shieldDamage += 0.5;
            shieldBounceCooldown = (21 - shieldLevel) * 1000;
            shieldBounceTimer = 0;
        }

        if (name === "Dual") {
            if (!player2) player2 = new PlayerBall();
        }

        if (name === "Magnet") {
            magnetLevel++;
            magnetStrength += 0.02;
        }

        if (name === "Dash") {
            dashLevel++;
            dashCooldown = Math.max(800, dashCooldown - 300);
            dashInvulTime += 80;
        }

        if (name === "Pierce") {
            pierceLevel = u.level;
        }

        if (name === "Cryo") {
            cryoLevel = u.level;
            cryoRadius = 50 + u.level * 30;
            cryoSlow = 0.99;
        }

        if (name === "Gravity") {
            gravityLevel = u.level;
        }

        if (name === "Multi") {
            multiLevel = u.level;
        }

        if (name === "Nova") {
            novaLevel = u.level;
            novaMaxCooldown = Math.max(3000, 8000 - u.level * 1500);
            novaRadius = 150 + u.level * 40;
            novaDamage = 2 + u.level;
        }

        if (name === "Regen") {
            regenLevel = u.level;
            regenInterval = Math.max(6000, 15000 - u.level * 3000);
        }

        const node = upgradeNodes.find(n => n.dataset.name === u.name);

        node.classList.add("unlocked");
        setTimeout(() => node.classList.remove("unlocked"), 400);

        const rect = node.getBoundingClientRect();
        spawnUpgradeParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);

        drawConnectionLines();
        updateBars();
    }
}

function updateBars() {
    let allMaxed = true;
    document.querySelectorAll(".upgradeNode").forEach(node => {
        const name = node.querySelector(".uName").textContent;
        const u = upgrades.find(x => x.name === name);
        if (!u) return;

        if (u.level < u.max) allMaxed = false;

        // Hide nodes whose requirements aren't met yet (and have no levels)
        if (!canBuyUpgrade(u) && u.level === 0) {
            node.style.display = "none";
            return;
        }

        node.style.display = "";
        node.style.opacity = 1;
        node.style.filter = "none";

        node.querySelector(".progressBar div").style.width =
            (u.level / u.max) * 100 + "%";

        // Update cost display
        let costEl = node.querySelector(".uCost");
        if (!costEl) {
            costEl = document.createElement("div");
            costEl.className = "uCost";
            node.querySelector(".progressBar").before(costEl);
        }
        if (u.level >= u.max) costEl.textContent = "MAX";
        else costEl.textContent = `Cost: ${getUpgradeCost(u)}`;

        // Show requirement hint
        let reqEl = node.querySelector(".uReq");
        if (!reqEl) {
            reqEl = document.createElement("div");
            reqEl.className = "uReq";
            costEl.after(reqEl);
        }
        if (!canBuyUpgrade(u) && u.requires.length > 0) {
            reqEl.textContent = "Needs: " + u.requires.map(r => `${r.name} Lv${r.level}`).join(", ");
        } else {
            reqEl.textContent = "";
        }
    });

    // Show prestige orb when all main upgrades are maxed
    if (allMaxed) {
        prestigeOrbEl.style.display = "block";
    }
}

function updateDashCooldown(delta) {
    if (!dashReady) {
        dashCooldownProgress += delta / dashCooldown;
        if (dashCooldownProgress > 1) dashCooldownProgress = 1;
    }
}

function checkCollisions() {
    for (let e of enemies) {
        let allBalls = [player, ...orbitBalls];
        if (player2) allBalls.push(player2);

        for (let b of allBalls) {
            const dx = e.x - b.x;
            const dy = e.y - b.y;
            const dist = Math.hypot(dx, dy);

            if (dist < e.size + b.size) {
                // Ghost immune when phased
                if (e.phases && !e.visible) continue;

                shakeTime = 0.1;
                const nx = dx / dist;
                const ny = dy / dist;

                e.vx += nx * 3;
                e.vy += ny * 3;

                // Collision tone pitched by enemy speed
                playCollisionTone(Math.hypot(e.vx, e.vy));

                // Use takeDamage for shielded enemies
                const orbDmg = b.damage || 1;
                const hit = e.takeDamage ? e.takeDamage(orbDmg) : (e.life -= orbDmg, true);
                if (hit) {
                    points += (e.pts || 1);
                    infoDiv.textContent = `Wave ${wave} | Points: ${points}`;
                }

                for (let i = 0; i < 10; i++)
                    particles.push(new Particle(e.x, e.y, e.color));
            }
        }

        // Enemy-enemy collisions
        for (let i = 0; i < enemies.length; i++) {
            for (let j = i + 1; j < enemies.length; j++) {
                let a = enemies[i];
                let b = enemies[j];
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                const dist = Math.hypot(dx, dy);
                if (dist < a.size + b.size) {
                    if (a.isBoss || b.isBoss) continue;
                    playCollisionTone(Math.hypot(a.vx + b.vx, a.vy + b.vy) * 0.5);
                    for (let k = 0; k < 20; k++)
                        particles.push(new Particle(a.x, a.y, "#ff4444"));
                    enemies.splice(j, 1);
                    enemies.splice(i, 1);
                    points++;
                    enemiesKilledThisWave++;
                    i--;
                    break;
                }
            }
        }

        // Enemy hits center → lose HP instead of instant death
        if (Math.hypot(e.x - center.x, e.y - center.y) < 20) {
            if (!dashVulnerable) continue;

            playerHP--;
            updateHPDisplay();
            shakeTime = 0.25;

            // Red flash
            const overlay = document.getElementById("damageOverlay");
            overlay.style.opacity = "1";
            setTimeout(() => overlay.style.opacity = "0", 200);

            // Remove this enemy
            e.life = 0;

            for (let i = 0; i < 20; i++)
                particles.push(new Particle(center.x, center.y, "#ff0000"));

            if (playerHP <= 0) {
                gameOver = true;
                isPaused = true;
                savedPoints = points;
                restartAfterMenu = true;

                const orb = document.getElementById("upgradeOrb");
                orb.style.animation = "orbDeathPulse 0.3s infinite alternate";

                setTimeout(() => {
                    orb.style.animation = "";
                    openUpgradeMenu();
                }, 1200);
            }
        }
    }
}

function animate(now = 0) {
    ctx.save();

    const delta = lastFrameTime ? now - lastFrameTime : 16.67;
    lastFrameTime = now;
    // dt = 1.0 at 60fps, scales proportionally; gameSpeed lets player fast-forward
    const dt = Math.min(delta / 16.67, 3) * gameSpeed;

    drawCooldownWheel();
    difficultyRamp += 0.00004 * dt;
    if (difficultyRamp > 1) difficultyRamp = 1;

    if (isPaused) {
        ctx.restore();
        requestAnimationFrame(animate);
        return;
    }

    screenShake(dt);
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Core
    ctx.beginPath();
    ctx.arc(center.x, center.y, 20, 0, Math.PI * 2);
    ctx.fillStyle = "#fff";
    ctx.fill();

    player.update(mouse.x, mouse.y);
    player.draw();

    orbitBalls.forEach((o, i) => {
        o.update(player.angle, i, orbitBalls.length, dt);
        o.draw();
    });

    if (player2) {
        player2.angle = player.angle + Math.PI;
        player2.x = center.x + Math.cos(player2.angle) * player2.orbitRadius;
        player2.y = center.y + Math.sin(player2.angle) * player2.orbitRadius;
        player2.draw();
    }

    // New systems
    applyGravityWell(dt);

    enemies.forEach(e => {
        e.update(dt);
        updateShieldCollision(e);
        e.draw();
    });

    particles.forEach(p => { p.update(dt); p.draw(); });
    particles = particles.filter(p => p.life > 0);

    checkCollisions();
    let newEnemies = [];

    enemies = enemies.filter(e => {
        if (e.life > 0) return true;

        // Boss splitting
        if (e.isBoss && e.generation !== undefined && e.generation < e.maxGeneration) {
            const splitCount = 2 + e.generation;
            for (let i = 0; i < splitCount; i++) {
                const angle = (Math.PI * 2 / splitCount) * i;
                const child = new BossEnemy(
                    e.x + Math.cos(angle) * 10,
                    e.y + Math.sin(angle) * 10,
                    e.size * 0.6,
                    e.generation + 1
                );
                child.vx = Math.cos(angle) * 3;
                child.vy = Math.sin(angle) * 3;
                newEnemies.push(child);
            }
            for (let i = 0; i < 20; i++)
                particles.push(new Particle(e.x, e.y, "#ff00ff"));
            enemiesKilledThisWave++;
            return false;
        }

        // Splitter enemy: spawn 2 small fast enemies
        if (e.splits) {
            for (let i = 0; i < 2; i++) {
                const angle = Math.random() * Math.PI * 2;
                const child = new Enemy(enemyTypes.fast);
                child.x = e.x + Math.cos(angle) * 10;
                child.y = e.y + Math.sin(angle) * 10;
                child.vx = Math.cos(angle) * 2;
                child.vy = Math.sin(angle) * 2;
                child.size = 6;
                child.life = 1;
                child.splits = false;
                newEnemies.push(child);
            }
            for (let i = 0; i < 10; i++)
                particles.push(new Particle(e.x, e.y, "#ff4488"));
        }

        if (!e.isBoss) enemiesKilledThisWave++;
        return false;
    });

    enemies.push(...newEnemies);

    let bossAlive = false;
    enemies.forEach(e => { if (e.isBoss) bossAlive = true; });
    if (inBossFight && !bossAlive) endBossFight();

    updateLaserSystem(delta * gameSpeed);
    checkWaveProgression();
    updateNova(delta * gameSpeed);
    updateRegen(delta * gameSpeed);
    drawLaserBeams(dt);
    if (shieldBounceTimer > 0) shieldBounceTimer -= delta * gameSpeed;
    drawShield(dt);
    drawCryoField();
    drawNovaFlash(dt);
    drawDashTrail(dt);
    updateDashCooldown(delta * gameSpeed);
    updateWaveProgress();

    // Update HUD
    infoDiv.textContent = `Wave ${wave} | Points: ${points}`;

    ctx.restore();

    if (!gameOver)
        requestAnimationFrame(animate);
}

orbitBalls = [new OrbitBall(0)];

// Difficulty presets
const difficultyPresets = {
    bethan: { hp: 5, spawnMul: 1.6, speedMul: 0.6, label: 'Bethan' },
    normal: { hp: 3, spawnMul: 1.0, speedMul: 1.0, label: 'Normal People' },
    curtis: { hp: 1, spawnMul: 0.5, speedMul: 1.5, label: 'Curtis' }
};
let difficultyMode = 'normal';
let diffSpawnMul = 1;
let diffSpeedMul = 1;

function chooseDifficulty(mode) {
    const preset = difficultyPresets[mode];
    difficultyMode = mode;
    diffSpawnMul = preset.spawnMul;
    diffSpeedMul = preset.speedMul;
    maxHP = preset.hp;
    playerHP = maxHP;
    document.getElementById('difficultyMenu').style.display = 'none';
    startGame();
}

function startGame() {
    spawnCount = 0;
    points = 0;
    gameOver = false;
    playerHP = maxHP;

    enemies = [];
    particles = [];

    player = new PlayerBall();
    orbitBalls = [new OrbitBall(0)];

    infoDiv.textContent = "Wave 1 | Points: 0";
    updateHPDisplay();
    startEnemySpawn();
    animate();

    openUpgradeMenu();
}
